<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Infinite Notes</title>
    
    <!-- Editor.js Core -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    
    <!-- Official Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/nested-list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/embed@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/warning@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/inline-code@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/underline@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/simple-image@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/raw@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/attaches@latest"></script>

    <!-- Popular Community Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/editorjs-toggle-block@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-alert@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-button@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-text-color-plugin@latest"></script>
    
    <!-- UI Enhancement Plugins (DragDrop & Undo) -->
    <script src="https://cdn.jsdelivr.net/npm/editorjs-drag-drop@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/editorjs-undo@latest"></script>

    <style>
        /* Pure Minimalist Styling */
        :root {
            --bg-color: #ffffff;
            --text-color: #111827;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* The Infinite Canvas */
        #editorjs {
            max-width: 750px;
            margin: 0 auto;
            padding: 10vh 20px 65vh 20px; /* Massive bottom padding */
            box-sizing: border-box;
        }

        /* Editor Overrides */
        .codex-editor__redactor { padding-bottom: 0 !important; }
        .ce-block__content, .ce-toolbar__content { max-width: 100% !important; }

        /* Block-specific aesthetics */
        cdx-marker { background-color: #fef08a; padding: 2px 4px; border-radius: 4px; }
        .ce-inline-tool-code { background: #f3f4f6; color: #ef4444; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .ce-code__textarea { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-family: monospace; }
        .tc-wrap { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
        .cdx-warning { background-color: #fffbeb; border-left: 4px solid #fbbf24; border-radius: 4px; }
        
        /* Alert Plugin custom styles */
        .ce-alert { border-radius: 8px; padding: 12px 16px; margin: 10px 0; }
        .ce-alert--primary { background-color: #eff6ff; border-left: 4px solid #3b82f6; color: #1e3a8a; }
        .ce-alert--danger { background-color: #fef2f2; border-left: 4px solid #ef4444; color: #991b1b; }
        .ce-alert--success { background-color: #f0fdf4; border-left: 4px solid #22c55e; color: #166534; }
        
        /* Toggle Plugin styling */
        .toggle-block__icon { color: #6b7280; }

        .custom-tool {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px;
            background: #fcfcfd;
        }

        .custom-tool input,
        .custom-tool textarea,
        .custom-tool select {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 12px;
            box-sizing: border-box;
            font: inherit;
            color: inherit;
            background: #ffffff;
            margin-top: 8px;
        }

        .custom-tool textarea {
            min-height: 92px;
            resize: vertical;
        }

        .custom-tool__row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .custom-tool__label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b5563;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        @media (max-width: 640px) {
            .custom-tool__row {
                grid-template-columns: 1fr;
            }
        }
        
        /* Hide scrollbar for maximum minimalism */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <!-- The Canvas -->
    <div id="editorjs"></div>

    <script>
        const STORAGE_KEY = 'ultimate_infinite_notes';

        function createInput(labelText, value, options = {}) {
            const wrapper = document.createElement('label');
            wrapper.className = 'custom-tool__field';

            const label = document.createElement('span');
            label.className = 'custom-tool__label';
            label.textContent = labelText;

            const element = document.createElement(options.multiline ? 'textarea' : 'input');

            if (!options.multiline) {
                element.type = options.type || 'text';
            }

            if (options.placeholder) {
                element.placeholder = options.placeholder;
            }

            if (options.min !== undefined) {
                element.min = options.min;
            }

            if (options.max !== undefined) {
                element.max = options.max;
            }

            if (options.step !== undefined) {
                element.step = options.step;
            }

            element.value = value || '';

            wrapper.append(label, element);
            return { wrapper, element };
        }

        class BannerBlock {
            static get toolbox() {
                return { title: 'Banner', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M4 5h16v14H4z" fill="none" stroke="currentColor" stroke-width="2"/><path d="M8 9h8M8 13h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    title: data.title || '',
                    subtitle: data.subtitle || '',
                    accent: data.accent || '#111827'
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';

                const title = createInput('Title', this.data.title, { placeholder: 'Big statement' });
                const subtitle = createInput('Subtitle', this.data.subtitle, { multiline: true, placeholder: 'Supporting line' });
                const accent = createInput('Accent', this.data.accent, { type: 'color' });

                this.wrapper.append(title.wrapper, subtitle.wrapper, accent.wrapper);
                this.titleInput = title.element;
                this.subtitleInput = subtitle.element;
                this.accentInput = accent.element;

                return this.wrapper;
            }

            save() {
                return {
                    title: this.titleInput.value.trim(),
                    subtitle: this.subtitleInput.value.trim(),
                    accent: this.accentInput.value || '#111827'
                };
            }
        }

        class CalloutCardBlock {
            static get toolbox() {
                return { title: 'Callout Card', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 3l9 4.5v9L12 21l-9-4.5v-9z" fill="none" stroke="currentColor" stroke-width="2"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    emoji: data.emoji || 'Idea',
                    title: data.title || '',
                    body: data.body || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';

                const row = document.createElement('div');
                row.className = 'custom-tool__row';
                const emoji = createInput('Label', this.data.emoji, { placeholder: 'Idea, Tip, Focus' });
                const title = createInput('Title', this.data.title, { placeholder: 'What matters here?' });
                row.append(emoji.wrapper, title.wrapper);

                const body = createInput('Body', this.data.body, { multiline: true, placeholder: 'Write the note' });

                this.wrapper.append(row, body.wrapper);
                this.emojiInput = emoji.element;
                this.titleInput = title.element;
                this.bodyInput = body.element;
                return this.wrapper;
            }

            save() {
                return {
                    emoji: this.emojiInput.value.trim(),
                    title: this.titleInput.value.trim(),
                    body: this.bodyInput.value.trim()
                };
            }
        }

        class TwoColumnNoteBlock {
            static get toolbox() {
                return { title: 'Split Note', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 5v14" fill="none" stroke="currentColor" stroke-width="2"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    leftTitle: data.leftTitle || '',
                    leftBody: data.leftBody || '',
                    rightTitle: data.rightTitle || '',
                    rightBody: data.rightBody || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';

                const row = document.createElement('div');
                row.className = 'custom-tool__row';

                const left = document.createElement('div');
                const leftTitle = createInput('Left Title', this.data.leftTitle, { placeholder: 'Column A' });
                const leftBody = createInput('Left Body', this.data.leftBody, { multiline: true, placeholder: 'Notes for the left side' });
                left.append(leftTitle.wrapper, leftBody.wrapper);

                const right = document.createElement('div');
                const rightTitle = createInput('Right Title', this.data.rightTitle, { placeholder: 'Column B' });
                const rightBody = createInput('Right Body', this.data.rightBody, { multiline: true, placeholder: 'Notes for the right side' });
                right.append(rightTitle.wrapper, rightBody.wrapper);

                row.append(left, right);
                this.wrapper.append(row);

                this.leftTitleInput = leftTitle.element;
                this.leftBodyInput = leftBody.element;
                this.rightTitleInput = rightTitle.element;
                this.rightBodyInput = rightBody.element;

                return this.wrapper;
            }

            save() {
                return {
                    leftTitle: this.leftTitleInput.value.trim(),
                    leftBody: this.leftBodyInput.value.trim(),
                    rightTitle: this.rightTitleInput.value.trim(),
                    rightBody: this.rightBodyInput.value.trim()
                };
            }
        }

        class MetricBlock {
            static get toolbox() {
                return { title: 'Metric', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M5 19V9M12 19V5M19 19v-7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    label: data.label || '',
                    value: data.value || '',
                    context: data.context || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';
                const row = document.createElement('div');
                row.className = 'custom-tool__row';
                const label = createInput('Label', this.data.label, { placeholder: 'North star' });
                const value = createInput('Value', this.data.value, { placeholder: '98%' });
                row.append(label.wrapper, value.wrapper);
                const context = createInput('Context', this.data.context, { multiline: true, placeholder: 'Why this number matters' });
                this.wrapper.append(row, context.wrapper);
                this.labelInput = label.element;
                this.valueInput = value.element;
                this.contextInput = context.element;
                return this.wrapper;
            }

            save() {
                return {
                    label: this.labelInput.value.trim(),
                    value: this.valueInput.value.trim(),
                    context: this.contextInput.value.trim()
                };
            }
        }

        class ProgressBlock {
            static get toolbox() {
                return { title: 'Progress', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 1 8 8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 12l5-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    label: data.label || '',
                    value: data.value || '50',
                    note: data.note || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';
                const row = document.createElement('div');
                row.className = 'custom-tool__row';
                const label = createInput('Label', this.data.label, { placeholder: 'Milestone' });
                const value = createInput('Percent', this.data.value, { type: 'number', min: 0, max: 100, step: 1 });
                row.append(label.wrapper, value.wrapper);
                const note = createInput('Note', this.data.note, { multiline: true, placeholder: 'What is left?' });
                this.wrapper.append(row, note.wrapper);
                this.labelInput = label.element;
                this.valueInput = value.element;
                this.noteInput = note.element;
                return this.wrapper;
            }

            save() {
                const numericValue = Number.parseInt(this.valueInput.value, 10);
                return {
                    label: this.labelInput.value.trim(),
                    value: Number.isNaN(numericValue) ? 0 : Math.min(100, Math.max(0, numericValue)),
                    note: this.noteInput.value.trim()
                };
            }
        }

        class TimelineEventBlock {
            static get toolbox() {
                return { title: 'Timeline Event', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 6v6l4 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    date: data.date || '',
                    title: data.title || '',
                    details: data.details || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';
                const row = document.createElement('div');
                row.className = 'custom-tool__row';
                const date = createInput('Date', this.data.date, { type: 'date' });
                const title = createInput('Title', this.data.title, { placeholder: 'Launch, meeting, checkpoint' });
                row.append(date.wrapper, title.wrapper);
                const details = createInput('Details', this.data.details, { multiline: true, placeholder: 'What happened or what happens next' });
                this.wrapper.append(row, details.wrapper);
                this.dateInput = date.element;
                this.titleInput = title.element;
                this.detailsInput = details.element;
                return this.wrapper;
            }

            save() {
                return {
                    date: this.dateInput.value,
                    title: this.titleInput.value.trim(),
                    details: this.detailsInput.value.trim()
                };
            }
        }

        class TagCloudBlock {
            static get toolbox() {
                return { title: 'Tags', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M10 4H5v5l9 9 5-5-9-9z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    title: data.title || '',
                    tags: data.tags || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';
                const title = createInput('Title', this.data.title, { placeholder: 'Grouping label' });
                const tags = createInput('Tags', this.data.tags, { multiline: true, placeholder: 'Comma-separated tags' });
                this.wrapper.append(title.wrapper, tags.wrapper);
                this.titleInput = title.element;
                this.tagsInput = tags.element;
                return this.wrapper;
            }

            save() {
                return {
                    title: this.titleInput.value.trim(),
                    tags: this.tagsInput.value.trim()
                };
            }
        }

        class QABlock {
            static get toolbox() {
                return { title: 'Q&A', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M9 9a3 3 0 1 1 5.2 2.1c-.8.8-1.7 1.3-2.2 2.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    question: data.question || '',
                    answer: data.answer || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';
                const question = createInput('Question', this.data.question, { placeholder: 'What are we trying to answer?' });
                const answer = createInput('Answer', this.data.answer, { multiline: true, placeholder: 'Write the answer here' });
                this.wrapper.append(question.wrapper, answer.wrapper);
                this.questionInput = question.element;
                this.answerInput = answer.element;
                return this.wrapper;
            }

            save() {
                return {
                    question: this.questionInput.value.trim(),
                    answer: this.answerInput.value.trim()
                };
            }
        }

        class ResourceLinkBlock {
            static get toolbox() {
                return { title: 'Resource Link', icon: '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M10 14L21 3M14 3h7v7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5" fill="none" stroke="currentColor" stroke-width="2"/></svg>' };
            }

            constructor({ data }) {
                this.data = {
                    label: data.label || '',
                    url: data.url || '',
                    description: data.description || ''
                };
            }

            render() {
                this.wrapper = document.createElement('div');
                this.wrapper.className = 'custom-tool';
                const label = createInput('Label', this.data.label, { placeholder: 'Reference title' });
                const url = createInput('URL', this.data.url, { type: 'url', placeholder: 'https://example.com' });
                const description = createInput('Description', this.data.description, { multiline: true, placeholder: 'Why save this link?' });
                this.wrapper.append(label.wrapper, url.wrapper, description.wrapper);
                this.labelInput = label.element;
                this.urlInput = url.element;
                this.descriptionInput = description.element;
                return this.wrapper;
            }

            save() {
                return {
                    label: this.labelInput.value.trim(),
                    url: this.urlInput.value.trim(),
                    description: this.descriptionInput.value.trim()
                };
            }
        }

        // An expanded default dataset showcasing the new blocks
        const defaultData = {
            blocks: [
                { type: "header", data: { text: "The Ultimate Infinite Canvas", level: 1 } },
                { type: "paragraph", data: { text: "Welcome to your distraction-free void. The UI is completely hidden. Just scroll down and type forever." } },
                { type: "alert", data: { type: "primary", message: "<b>New Feature:</b> Drag & Drop is now enabled. Grab the 6-dot menu to the left of any block to rearrange your notes." } },
                { type: "paragraph", data: { text: "We've also added <font color=\"#3b82f6\">Text Colors</font>, <u>Underlines</u>, and full <mark>Undo/Redo</mark> (Ctrl+Z) support." } },
                { type: "banner", data: { title: "A much bigger block menu", subtitle: "This canvas now includes a larger set of structured blocks for planning, capture, references, metrics, and formatted layouts.", accent: "#2563eb" } },
                { type: "toggle", data: { text: "Click here to expand the list of new tools!", status: "closed", items: [
                    { type: "list", data: { style: "unordered", items: [
                        { content: "Nested Lists (Press Tab inside a list!)", items: [
                            { content: "Like this sub-bullet", items: [] },
                            { content: "And this one", items: [] }
                        ]},
                        { content: "Alert / Callout Boxes", items: [] },
                        { content: "Interactive Buttons", items: [] },
                        { content: "Toggle Blocks (You're looking at one)", items: [] },
                        { content: "Text Color & Underline", items: [] },
                        { content: "Banner, Metric, Progress, Timeline, Tags, Q&A, Split Notes", items: [] },
                        { content: "File attachments and resource links", items: [] }
                    ]}}
                ]}},
                { type: "calloutCard", data: { emoji: "Focus", title: "Meeting prep", body: "Capture the agenda, open questions, risks, and a next-step owner in one place." } },
                { type: "twoColumnNote", data: { leftTitle: "Pros", leftBody: "Fast to scan\nStructured\nGood for summaries", rightTitle: "Tradeoffs", rightBody: "Requires a little more setup\nBest for intentional notes" } },
                { type: "metric", data: { label: "Weekly completion", value: "82%", context: "Most active work is landing, but review throughput still needs attention." } },
                { type: "progressBlock", data: { label: "Launch readiness", value: 68, note: "Docs and edge-case testing remain before release." } },
                { type: "timelineEvent", data: { date: "2026-04-17", title: "Canvas expansion", details: "Added a much larger set of block types and safer startup handling." } },
                { type: "tagCloud", data: { title: "Current themes", tags: "planning, docs, research, backlog, design, launch" } },
                { type: "qaBlock", data: { question: "What belongs in a good note block library?", answer: "A mix of freeform writing, structure, references, metrics, and quick capture tools." } },
                { type: "resourceLink", data: { label: "Editor.js docs", url: "https://editorjs.io", description: "Use this for core API and plugin references." } },
                { type: "delimiter", data: {} },
                { type: "button", data: { text: "Learn Editor.js", link: "https://editorjs.io" } },
                { type: "quote", data: { text: "We have reached maximum block capacity.", caption: "The Developer", alignment: "left" } },
            ]
        };

        function getStoredEditorData() {
            const savedData = localStorage.getItem(STORAGE_KEY);

            if (!savedData) {
                return defaultData;
            }

            try {
                return JSON.parse(savedData);
            } catch (error) {
                console.error('Failed to parse saved editor data. Resetting to defaults.', error);
                localStorage.removeItem(STORAGE_KEY);
                return defaultData;
            }
        }

        function buildTools() {
            const tools = {
                header: { class: Header, inlineToolbar: inlineToolbarConfig, config: { levels: [1, 2, 3, 4], defaultLevel: 2 } },
                list: { class: NestedList, inlineToolbar: inlineToolbarConfig, config: { defaultStyle: 'unordered' } },
                checklist: { class: Checklist, inlineToolbar: inlineToolbarConfig },
                quote: { class: Quote, inlineToolbar: inlineToolbarConfig },
                code: { class: CodeTool },
                embed: { class: Embed, inlineToolbar: true, config: { services: { youtube: true, codepen: true, twitter: true } } },
                table: { class: Table, inlineToolbar: inlineToolbarConfig },
                delimiter: { class: Delimiter },
                warning: { class: Warning, inlineToolbar: inlineToolbarConfig },
                raw: { class: RawTool },
                image: { class: SimpleImage },
                alert: { class: Alert, inlineToolbar: inlineToolbarConfig, config: { defaultType: 'primary', messagePlaceholder: 'Enter callout text' } },
                toggle: { class: ToggleBlock, inlineToolbar: true },
                banner: { class: BannerBlock },
                calloutCard: { class: CalloutCardBlock },
                twoColumnNote: { class: TwoColumnNoteBlock },
                metric: { class: MetricBlock },
                progressBlock: { class: ProgressBlock },
                timelineEvent: { class: TimelineEventBlock },
                tagCloud: { class: TagCloudBlock },
                qaBlock: { class: QABlock },
                resourceLink: { class: ResourceLinkBlock },
                Marker: { class: Marker, shortcut: 'CMD+SHIFT+M' },
                inlineCode: { class: InlineCode, shortcut: 'CMD+SHIFT+C' },
                underline: { class: Underline, shortcut: 'CMD+U' }
            };

            if (typeof AnyButton === 'function') {
                tools.button = {
                    class: AnyButton,
                    inlineToolbar: false,
                    config: {
                        css: {
                            btnColor: 'btn--gray'
                        }
                    }
                };
            }

            if (typeof AttachesTool === 'function') {
                tools.attaches = {
                    class: AttachesTool,
                    config: {
                        buttonText: 'Attach a local file',
                        uploader: {
                            uploadByFile(file) {
                                return Promise.resolve({
                                    success: 1,
                                    file: {
                                        url: URL.createObjectURL(file),
                                        name: file.name,
                                        size: file.size,
                                        extension: file.name.includes('.') ? file.name.split('.').pop() : ''
                                    }
                                });
                            }
                        }
                    }
                };
            }

            if (window.ColorPlugin) {
                tools.Color = {
                    class: window.ColorPlugin,
                    config: {
                        colorCollections: ['#EF4444','#F97316','#F59E0B','#10B981','#3B82F6','#6366F1','#8B5CF6','#EC4899','#111827','#6B7280'],
                        defaultColor: '#111827',
                        type: 'text',
                        customPicker: true
                    }
                };
            }

            return tools;
        }

        let editorData = getStoredEditorData();

        // Shared Inline Toolbar configuration to ensure all tools get colors, highlights, etc.
        const inlineToolbarConfig = ['Marker', 'inlineCode', 'underline', 'Color', 'link'];

        let editor;

        function createEditor(data) {
            editor = new EditorJS({
                holder: 'editorjs',
                placeholder: 'Type \'/\' for commands or hit Tab...',
                data,
                tools: buildTools(),

                // Wait for the editor to initialize, then attach DragDrop and Undo
                onReady: () => {
                    if (typeof Undo === 'function') {
                        new Undo({ editor });
                    }

                    if (typeof DragDrop === 'function') {
                        new DragDrop(editor);
                    }

                    console.log('Canvas ready');
                },

                // Auto-save silently to browser memory
                onChange: async () => {
                    try {
                        const outputData = await editor.save();
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(outputData));
                    } catch (error) {
                        console.error('Failed to save editor data.', error);
                    }
                }
            });

            return editor.isReady;
        }

        createEditor(editorData).catch((error) => {
            console.error('Editor failed to initialize. Resetting saved data.', error);
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('editorjs').innerHTML = '';
            editorData = defaultData;

            createEditor(defaultData).catch((fallbackError) => {
                console.error('Editor failed to initialize with default data.', fallbackError);
            });
        });
    </script>
</body>
</html>
