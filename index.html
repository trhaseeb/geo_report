<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL NOTES</title>
    
    <!-- Marked.js for Markdown -> HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Turndown.js for HTML -> Markdown -->
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    
    <!-- DOMPurify for security -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <style>
        :root {
            --bg: #f4f4f0;
            --fg: #111111;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --fg: #f4f4f0;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg);
            color: var(--fg);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            line-height: 1.6;
        }

        ::selection { background-color: var(--fg); color: var(--bg); }
        ::-webkit-scrollbar { width: 14px; height: 14px; border-left: 4px solid var(--fg); }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--fg); }

        header {
            padding: 1.5rem 1.5rem 0 1.5rem;
            border-bottom: 6px solid var(--fg);
            flex-shrink: 0;
            user-select: none;
        }

        .header-title {
            font-size: clamp(3rem, 9vw, 7rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.06em;
            line-height: 0.8;
            padding-bottom: 0.5rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%; 
            transition: color 0.1s;
        }

        .header-title:hover { color: #888888; }
        .header-title.is-root { cursor: default; }
        .header-title.is-root:hover { color: var(--fg); }

        .sub-header {
            padding: 0.5rem 1.5rem 1.5rem 1.5rem;
            flex-shrink: 0;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .mode-link {
            font-family: inherit;
            font-size: clamp(0.75rem, 1.5vw, 1rem);
            font-weight: 900;
            color: var(--fg);
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s;
            opacity: 0.6;
        }

        .mode-link:hover {
            opacity: 1;
            text-decoration: underline;
            text-decoration-thickness: 3px;
            text-underline-offset: 4px;
        }

        .brutal-select {
            appearance: none;
            background: transparent;
            border: 2px solid var(--fg);
            color: var(--fg);
            font-family: inherit;
            font-weight: 900;
            text-transform: uppercase;
            padding: 0.2em 0.6em;
            font-size: clamp(0.7rem, 1vw, 0.9rem);
            cursor: pointer;
            outline: none;
        }
        
        .brutal-select option {
            background: var(--bg);
            color: var(--fg);
        }

        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .workspace-pane {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            padding: clamp(1.5rem, 5vw, 3rem);
            overflow-y: auto;
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            font-size: clamp(1rem, 2vw, 1.25rem);
            outline: none;
            font-weight: 500;
            resize: none;
        }

        .workspace-content {
            max-width: 56rem;
            margin: 0 auto;
            width: 100%;
            min-height: 100%; 
            padding-bottom: 20vh; 
        }

        .hidden { display: none !important; }

        .ghost-text {
            color: #aaaaaa;
            pointer-events: none;
            user-select: none;
        }

        /* Prose Styling */
        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
            font-family: inherit; text-transform: uppercase; font-weight: 900;
            letter-spacing: -0.05em; margin-top: 1.5em; margin-bottom: 0.5em; line-height: 1.1;
        }
        .prose > *:first-child { margin-top: 0; }
        .prose h1 { font-size: 2.25em; }
        .prose h2 { font-size: 1.8em; }
        .prose h3 { font-size: 1.5em; }
        
        .prose p, .prose ul, .prose ol { margin-bottom: 1em; }
        .prose ul { list-style-type: disc; padding-left: 1.5em; }
        .prose ol { list-style-type: decimal; padding-left: 1.5em; }
        .prose li { margin-bottom: 0.5em; }

        .prose a {
            color: var(--fg); font-weight: 900; text-decoration: underline;
            text-decoration-thickness: 3px; text-underline-offset: 4px; cursor: pointer;
        }
        .prose a:hover { background-color: var(--fg); color: var(--bg); }

        .prose blockquote {
            border-left: 8px solid var(--fg); padding: 0.5em 1.5em;
            background: rgba(128, 128, 128, 0.1); margin: 0; font-weight: bold;
        }
        .prose blockquote p:last-child { margin-bottom: 0; }

        .prose hr { border: none; border-top: 4px solid var(--fg); margin: 2em 0; }
        .prose code { border: 2px solid var(--fg); padding: 0.1em 0.3em; font-size: 0.9em; }
        .prose pre { border: 4px solid var(--fg); padding: 1em; overflow-x: auto; margin-bottom: 1em; }
        .prose pre code { border: none; padding: 0; }

        .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; border: 4px solid var(--fg); }
        .prose th, .prose td { border: 2px solid var(--fg); padding: 0.75em; text-align: left; }
        .prose th { background-color: var(--fg); color: var(--bg); text-transform: uppercase; font-weight: 900; }

        #live-editor:empty:before { content: attr(placeholder); color: #888; pointer-events: none; }
        .prose p:empty:before, .prose h1:empty:before, .prose h2:empty:before, 
        .prose h3:empty:before, .prose h4:empty:before, .prose h5:empty:before, 
        .prose h6:empty:before { content: "\200B"; }

    </style>
</head>
<body>

    <header>
        <h1 id="date-title" class="header-title">Loading...</h1>
    </header>
    <div class="sub-header">
        <a href="#" id="mode-toggle" class="mode-link">Mode: Live</a>
        <span style="opacity: 0.4;">|</span>
        <select id="ai-model-select" class="brutal-select">
            <option value="Xenova/Qwen1.5-0.5B-Chat">AI: Fast (0.5B)</option>
            <option value="Xenova/TinyLlama-1.1B-Chat-v1.0">AI: Balanced (1.1B)</option>
            <option value="Xenova/Qwen1.5-1.8B-Chat">AI: Smart (1.8B)</option>
        </select>
    </div>

    <main>
        <div id="live-editor" contenteditable="true" class="workspace-pane prose workspace-content" placeholder="Start typing naturally..." spellcheck="false"></div>
        <textarea id="raw-editor" class="workspace-pane workspace-content hidden" placeholder="Start typing raw markdown here..." spellcheck="false"></textarea>
        <div id="read-preview" class="workspace-pane prose workspace-content hidden"></div>
    </main>
    
    <script>
        const liveEditor = document.getElementById('live-editor');
        const rawEditor = document.getElementById('raw-editor');
        const readPreview = document.getElementById('read-preview');
        const modeToggle = document.getElementById('mode-toggle');
        const dateTitle = document.getElementById('date-title');
        
        const modes = ['Live', 'Raw', 'Read'];
        let currentModeIndex = 0; 
        let notes = {};
        let currentKey = '';
        let saveTimeout;
        const VIRTUAL_PAGES = ['index', 'diary', 'tags'];

        let currentGhostSuggestion = null;
        let ghostNode = null;

        function removeGhost() {
            if (ghostNode && ghostNode.parentNode) {
                ghostNode.parentNode.removeChild(ghostNode);
            }
            ghostNode = null;
            currentGhostSuggestion = null;
        }

        // Setup Marked
        marked.use({
            gfm: true,
            extensions: [{
                name: 'hashtag',
                level: 'inline',
                start(src) { const match = src.match(/(^|\s)#([a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)/); return match ? match.index : undefined; },
                tokenizer(src) {
                    const match = /^(\s?)#([a-zA-Z0-9_]+)(?:\.([a-zA-Z0-9_]+))?/.exec(src);
                    if (match) return { type: 'hashtag', raw: match[0], space: match[1], baseTag: match[2], fullTag: match[3] ? `${match[2]}.${match[3]}` : match[2] };
                },
                renderer(token) { return `${token.space}<a href="#tag-${token.baseTag.toLowerCase()}">#${token.fullTag}</a>`; }
            }]
        });

        // Setup Turndown (Bare Minimum)
        const turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-', codeBlockStyle: 'fenced' });
        
        turndownService.addRule('hashtag', {
            filter: (node) => node.nodeName === 'A' && node.getAttribute('href') && node.getAttribute('href').startsWith('#tag-'),
            replacement: (content) => content 
        });

        turndownService.addRule('ghostText', {
            filter: (node) => node.nodeName === 'SPAN' && node.classList.contains('ghost-text'),
            replacement: () => '' 
        });

        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDateDisplay(key) {
            const [y, m, d] = key.split('-');
            return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function getAllKnownTags() {
            let tagSet = new Set();
            for (let k in notes) {
                if (VIRTUAL_PAGES.includes(k)) continue;
                const matches = notes[k].match(/(?:^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)\b/g);
                if (matches) matches.forEach(m => tagSet.add(m.trim()));
            }
            return Array.from(tagSet).sort();
        }

        function loadNotesData() {
            const saved = localStorage.getItem('brutalNotes');
            if (saved) notes = JSON.parse(saved);
        }

        function saveNotesData() {
            const toSave = {};
            for(let k in notes) if(!VIRTUAL_PAGES.includes(k)) toSave[k] = notes[k];
            localStorage.setItem('brutalNotes', JSON.stringify(toSave));
        }

        function flushLiveSave() {
            if (modes[currentModeIndex] === 'Live' && !VIRTUAL_PAGES.includes(currentKey)) {
                let markdown = turndownService.turndown(liveEditor.innerHTML).replace(/\u00A0/g, ' ');
                if (!markdown.trim() || markdown === '\\') markdown = ''; 
                notes[currentKey] = markdown;
                saveNotesData();
            }
        }

        // Expose functions for the AI Module
        window.brutalNotesData = notes;
        window.flushLiveSave = flushLiveSave;
        window.DOMPurify = DOMPurify;
        window.marked = marked;
        
        // Grab recent diary entries so the AI knows what's going on
        window.getRecentContext = function() {
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();
            let context = "";
            for(let i=0; i<Math.min(3, dayKeys.length); i++) {
                // Limit to 500 chars per day to save memory for the local model
                context += `Date: ${dayKeys[i]}\n${notes[dayKeys[i]].substring(0, 500)}\n\n`; 
            }
            return context;
        };

        function getDynamicHashtagContent(baseTagName) {
            let groups = { _base: [] };
            const dayKeys = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();
            
            dayKeys.forEach(day => {
                const blocks = (notes[day] || '').split('\n\n');
                blocks.forEach(block => {
                    const regex = new RegExp(`(?:^|\\s)#${baseTagName}(?:\\.([a-zA-Z0-9_]+))?\\b`, 'gi');
                    let match;
                    let matchedSubtags = new Set(), matchedBase = false;
                    
                    while ((match = regex.exec(block)) !== null) {
                        if (match[1]) matchedSubtags.add(match[1].toLowerCase());
                        else matchedBase = true;
                    }
                    
                    if (matchedBase) groups._base.push({ day, text: block });
                    matchedSubtags.forEach(sub => {
                        if (!groups[sub]) groups[sub] = [];
                        groups[sub].push({ day, text: block });
                    });
                });
            });
            
            let tagMarkdown = `\n\n---\n\n`;
            let hasMentions = false;
            
            if (groups._base.length > 0) {
                hasMentions = true;
                tagMarkdown += `## GENERAL MENTIONS\n\n`;
                groups._base.forEach(item => tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`);
            }
            
            Object.keys(groups).filter(k => k !== '_base').sort().forEach(sub => {
                hasMentions = true;
                tagMarkdown += `## ${sub.toUpperCase()}\n\n`;
                groups[sub].forEach(item => tagMarkdown += `### [${formatDateDisplay(item.day)}](#${item.day})\n\n> ${item.text.replace(/\n/g, '\n> ')}\n\n`);
            });
            
            if (!hasMentions) tagMarkdown += "## AGGREGATED MENTIONS\n*No mentions found yet.*";
            return tagMarkdown;
        }

        function updateModeUI() {
            const mode = modes[currentModeIndex];
            modeToggle.innerText = `[ Mode: ${mode} ]`;
            
            liveEditor.classList.add('hidden');
            rawEditor.classList.add('hidden');
            readPreview.classList.add('hidden');
            
            let rawMarkdown = notes[currentKey] || '';

            if (mode === 'Live') {
                liveEditor.innerHTML = DOMPurify.sanitize(marked.parse(rawMarkdown), { ADD_TAGS: ['table', 'th', 'tr', 'td', 'thead', 'tbody'] });
                liveEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) liveEditor.focus();
            } else if (mode === 'Raw') {
                rawEditor.value = rawMarkdown;
                rawEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) rawEditor.focus();
            } else if (mode === 'Read') {
                if (currentKey.startsWith('tag-')) rawMarkdown += getDynamicHashtagContent(currentKey.substring(4));
                readPreview.innerHTML = DOMPurify.sanitize(marked.parse(rawMarkdown), { ADD_TAGS: ['table', 'th', 'tr', 'td', 'thead', 'tbody'] });
                readPreview.classList.remove('hidden');
            }
        }

        function loadIndex() {
            flushLiveSave(); currentKey = 'index';
            notes['index'] = `*Root Directory*\n\n- [Diary](#diary)\n- [Tags](#tags)`;
            dateTitle.innerText = 'Index'; dateTitle.classList.add('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadDiary() {
            flushLiveSave(); currentKey = 'diary';
            const links = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse().map(k => `- [${formatDateDisplay(k)}](#${k})`).join('\n');
            notes['diary'] = `*All daily notes.*\n\n${links || '*No notes yet.*'}`;
            dateTitle.innerText = 'Diary'; dateTitle.classList.remove('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadTags() {
            flushLiveSave(); currentKey = 'tags';
            const tags = new Set();
            Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).forEach(k => {
                const matches = notes[k].match(/(?:^|\s)#([a-zA-Z0-9_]+)(?:\.[a-zA-Z0-9_]+)?\b/g);
                if (matches) matches.forEach(m => tags.add(m.trim().substring(1).toLowerCase().split('.')[0]));
            });
            const tagLinks = Array.from(tags).sort().map(t => `- [#${t}](#tag-${t})`).join('\n') || "*No hashtags used yet.*";
            notes['tags'] = `*All tags used across notes.*\n\n${tagLinks}`;
            dateTitle.innerText = 'Tags'; dateTitle.classList.remove('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadNote(key) {
            flushLiveSave(); currentKey = key;
            if (notes[key] === undefined) {
                notes[key] = key.startsWith('tag-') ? `*Write notes or a definition for this tag here.*` : '';
                saveNotesData();
            }
            dateTitle.classList.remove('is-root');
            if (key.startsWith('tag-')) {
                dateTitle.innerText = '#' + key.substring(4).toUpperCase();
                if (currentModeIndex !== 2) currentModeIndex = 2;
            } else {
                dateTitle.innerText = formatDateDisplay(key);
                if (currentModeIndex === 2) currentModeIndex = 0; 
            }
            updateModeUI();
        }

        modeToggle.addEventListener('click', (e) => {
            e.preventDefault(); 
            flushLiveSave();
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            updateModeUI();
        });

        liveEditor.addEventListener('mousedown', removeGhost);
        liveEditor.addEventListener('blur', removeGhost);

        liveEditor.addEventListener('keydown', (e) => {
            
            // AI Trigger Logic: Detect `#tag/ prompt` on Enter
            if (e.key === 'Enter') {
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);
                    const aiMatch = text.match(/(?:^|\s)#([a-zA-Z0-9_.]+)\/\s*(.+)$/);
                    
                    if (aiMatch) {
                        e.preventDefault();
                        const aiTag = aiMatch[1].toLowerCase();
                        const aiPrompt = aiMatch[2];

                        // Create the AI Loading Block and move cursor down
                        const aiBlockId = 'ai-' + Date.now();
                        document.execCommand('insertHTML', false, `<br><br><blockquote id="${aiBlockId}">🤖 Initializing Local AI Engine...</blockquote><p>&#8203;</p>`);
                        
                        // Fire off the AI in the background
                        if (window.runLocalAI) {
                            window.runLocalAI(aiTag, aiPrompt, aiBlockId);
                        }
                        return;
                    }
                }
            }

            // Core Tab Autocomplete
            if ((e.key === 'Tab' || e.key === 'ArrowRight') && currentGhostSuggestion) {
                e.preventDefault();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const node = sel.focusNode;
                    const match = node.textContent.substring(0, sel.focusOffset).match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    removeGhost(); 
                    if (match) {
                        const range = document.createRange();
                        range.setStart(node, sel.focusOffset - match[1].length);
                        range.setEnd(node, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('insertHTML', false, `<a href="#tag-${currentGhostSuggestion.substring(1).split('.')[0].toLowerCase()}">${currentGhostSuggestion}</a>&nbsp;`);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                } else removeGhost();
                return;
            }

            if (e.key === 'Escape' || e.key.startsWith('Arrow')) removeGhost();

            // Core formatting shortcuts
            if (e.key === ' ') {
                removeGhost();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);
                    
                    const tagMatch = text.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    if (tagMatch) {
                        e.preventDefault();
                        const range = document.createRange();
                        range.setStart(sel.focusNode, sel.focusOffset - tagMatch[1].length);
                        range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('insertHTML', false, `<a href="#tag-${tagMatch[1].substring(1).split('.')[0].toLowerCase()}">${tagMatch[1]}</a>&nbsp;`);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                        return; 
                    }

                    const hMatch = text.match(/^(#{1,6})$/);
                    if (hMatch || text === '>' || text === '-' || text === '1.') {
                        e.preventDefault(); 
                        const range = document.createRange();
                        range.setStart(sel.focusNode, 0); range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('delete', false, null);
                        
                        if (hMatch) document.execCommand('formatBlock', false, `<H${hMatch[1].length}>`);
                        else if (text === '>') document.execCommand('formatBlock', false, `<BLOCKQUOTE>`);
                        else if (text === '-') document.execCommand('insertUnorderedList', false, null);
                        else document.execCommand('insertOrderedList', false, null);
                        
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                }
            }
        });

        liveEditor.addEventListener('input', (e) => {
            removeGhost();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(flushLiveSave, 500);

            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0 || sel.focusNode.nodeType !== Node.TEXT_NODE) return;

            const match = sel.focusNode.textContent.substring(0, sel.focusOffset).match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
            if (match && match[1].length >= 2) {
                const typingTag = match[1];
                const suggestion = getAllKnownTags().find(t => t.toLowerCase().startsWith(typingTag.toLowerCase()) && t.length > typingTag.length);
                if (suggestion) {
                    currentGhostSuggestion = typingTag + suggestion.substring(typingTag.length); 
                    ghostNode = document.createElement('span');
                    ghostNode.className = 'ghost-text';
                    ghostNode.textContent = suggestion.substring(typingTag.length);
                    ghostNode.contentEditable = 'false';
                    
                    const range = sel.getRangeAt(0);
                    range.insertNode(ghostNode);
                    range.setStartBefore(ghostNode);
                    range.collapse(true);
                    sel.removeAllRanges(); sel.addRange(range);
                }
            }
        });

        rawEditor.addEventListener('input', () => {
            if (!VIRTUAL_PAGES.includes(currentKey)) {
                notes[currentKey] = rawEditor.value;
                saveNotesData();
            }
        });

        function handleLinkClick(e) {
            let target = e.target;
            while (target && target.tagName !== 'A' && target !== this) target = target.parentElement;
            if (target && target.tagName === 'A') {
                const href = target.getAttribute('href');
                if (href) {
                    e.preventDefault();
                    if (href === '#diary') loadDiary();
                    else if (href === '#tags') loadTags();
                    else loadNote(href.substring(1));
                }
            }
        }
        
        liveEditor.addEventListener('click', handleLinkClick);
        readPreview.addEventListener('click', handleLinkClick);

        dateTitle.addEventListener('click', () => {
            if (currentKey === 'index') return;
            else if (currentKey === 'diary' || currentKey === 'tags') loadIndex();
            else if (currentKey.startsWith('tag-')) loadTags();
            else loadDiary();
        });

        document.querySelector('.workspace-pane').addEventListener('click', (e) => {
            if(e.target === liveEditor && currentModeIndex === 0) liveEditor.focus();
        });

        window.addEventListener('DOMContentLoaded', () => {
            const isFirstVisit = !localStorage.getItem('brutalNotes');
            window.notes = notes; // expose for AI
            loadNotesData();
            const todayKey = getTodayKey();
            
            if (isFirstVisit) {
                notes[todayKey] = `Welcome to your brutalist notebook.\n\nUse **Live Mode** for fast writing. \n\n**NEW: LOCAL DEVICE AI**\nThis app runs AI entirely in your browser using WebAssembly. No backend, complete privacy.\n\nTo configure it:\n1. Click on [#me](#tag-me) and write a few sentences about who you are.\n2. Click on [#assistant](#tag-assistant) and define a personality for it.\n\nTo trigger it, just type the tag, add a forward slash \`/\` and your prompt, then hit **Enter**. Try typing this below:\n\n#assistant/ What are you?`;
                saveNotesData();
            }
            loadNote(todayKey);
        });
    </script>

    <!-- THE LOCAL AI ENGINE (Transformers.js) -->
    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        
        // Prevent it from looking for local node.js files
        env.allowLocalModels = false;

        let generator = null;
        let currentLoadedModel = null;

        window.runLocalAI = async function(aiTag, userPrompt, blockId) {
            const block = document.getElementById(blockId);
            if (!block) return;

            const select = document.getElementById('ai-model-select');
            const targetModel = select.value;

            // Load the model if it's the first time or the user changed the dropdown
            if (generator === null || currentLoadedModel !== targetModel) {
                block.innerHTML = `🤖 <strong>#${aiTag}:</strong> Downloading AI weights (${targetModel})... This only happens once!`;
                currentLoadedModel = targetModel;
                try {
                    generator = await pipeline('text-generation', currentLoadedModel, {
                        progress_callback: (x) => {
                            if (x.status === 'progress') {
                                block.innerHTML = `🤖 <strong>#${aiTag}:</strong> Downloading Model... ${Math.round(x.progress)}%`;
                            } else if (x.status === 'ready') {
                                block.innerHTML = `🤖 <strong>#${aiTag}:</strong> Model loaded into RAM. Generating response...`;
                            }
                        }
                    });
                } catch (e) {
                    block.innerHTML = `❌ Error loading local model: ${e.message}`;
                    return;
                }
            }

            block.innerHTML = `🤖 <strong>#${aiTag}</strong> is thinking...`;

            // --- BUILD THE INTELLIGENT SYSTEM PROMPT ---
            let systemPrompt = "You are a helpful AI assistant inside a Brutalist notebook app. Be concise, direct, and helpful.";
            
            // 1. Inject the Master Persona (#me)
            if (window.brutalNotesData['tag-me']) {
                systemPrompt += "\n\n--- ABOUT THE USER ---\n" + window.brutalNotesData['tag-me'];
            }
            
            // 2. Inject the Specific Tag Instructions (e.g. #assistant, #writer, #coder)
            if (window.brutalNotesData[`tag-${aiTag}`]) {
                systemPrompt += `\n\n--- YOUR PERSONA/INSTRUCTIONS (${aiTag.toUpperCase()}) ---\n` + window.brutalNotesData[`tag-${aiTag}`];
            }

            // 3. Inject Context (The last 3 diary notes)
            systemPrompt += "\n\n--- RECENT DIARY ENTRIES (For Context) ---\n" + window.getRecentContext();

            // --- FORMAT PROMPT FOR SPECIFIC MODELS ---
            let formattedPrompt = "";
            if (currentLoadedModel.includes('Qwen')) {
                // Qwen uses ChatML formatting
                formattedPrompt = `<|im_start|>system\n${systemPrompt}<|im_end|>\n<|im_start|>user\n${userPrompt}<|im_end|>\n<|im_start|>assistant\n`;
            } else if (currentLoadedModel.includes('TinyLlama')) {
                // TinyLlama custom tokens
                formattedPrompt = `<|system|>\n${systemPrompt}</s>\n<|user|>\n${userPrompt}</s>\n<|assistant|>\n`;
            } else {
                formattedPrompt = `${systemPrompt}\n\nUser: ${userPrompt}\nAssistant:`;
            }

            try {
                // Run the local inference!
                const output = await generator(formattedPrompt, {
                    max_new_tokens: 250,    // Keep it snappy
                    temperature: 0.7,       // Balanced creativity
                    repetition_penalty: 1.1 // Prevent loops
                });

                let responseText = output[0].generated_text;
                
                // Strip the prompt formatting out so we only show the answer
                if (responseText.startsWith(formattedPrompt)) {
                    responseText = responseText.substring(formattedPrompt.length);
                }
                
                // Clean and format the response to safe HTML
                const finalHTML = window.DOMPurify.sanitize(window.marked.parse(responseText.trim()));
                
                // Inject the generated response
                block.innerHTML = `<strong>#${aiTag}:</strong><br>${finalHTML}`;
                
                // Force a sync to save the newly generated text as Markdown
                window.flushLiveSave();

            } catch(e) {
                block.innerHTML = `❌ Inference Error: ${e.message}`;
            }
        };
    </script>
