<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Infinite Notes</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">

    <style>
        /* ========================================================================== */
        /* OVERSIZED NEON TYPOGRAPHY                                                  */
        /* ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,800;0,900;1,900&family=JetBrains+Mono:wght@400;800&display=swap');

        :root {
            --bg: #ffffff;
            --fg: #000000;
            --grid: #e5e5e5;
            --meta: #999999;
            --neon: #D946EF; /* Nova Fuchsia */
            --cyan: #00FFCC;
            
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --border: 3px solid var(--fg);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #ffffff;
                --grid: #1a1a1a;
                --meta: #555555;
                --border: 3px solid var(--fg);
            }
        }

        * { box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); color: var(--fg); 
            font-family: var(--font-sans); margin: 0; padding: 0; 
            overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { display: none; }
        ::selection { background: var(--neon); color: #fff; }

        /* --- LAYOUT (MAX REAL ESTATE) --- */
        .app-container { 
            max-width: 900px; margin: 0 auto; 
            /* Push padding to the absolute minimum on the left for edge-bleed */
            padding: calc(8vh + var(--safe-top)) 16px calc(30vh + var(--safe-bottom)) 20px; 
            min-height: 100vh; position: relative;
        }

        /* --- OVERSIZED HEADER --- */
        .date-header { 
            font-family: var(--font-sans);
            font-size: clamp(60px, 18vw, 150px); 
            font-weight: 900; font-style: italic; text-transform: uppercase; 
            letter-spacing: -0.07em; line-height: 0.8; 
            margin: 0 0 24px -6px; cursor: pointer; user-select: none;
        }
        .date-header:hover { color: var(--neon); }

        .sys-bar { 
            display: flex; align-items: baseline; gap: 24px; 
            margin-bottom: 60px; border-bottom: var(--border); padding-bottom: 12px;
            font-family: var(--font-mono); font-size: 14px; 
            font-weight: 800; text-transform: uppercase; letter-spacing: -0.02em;
        }
        
        .sys-ai { color: var(--neon); }
        .sys-ai.loading { animation: pulse 1s step-end infinite; }
        .sys-save { color: var(--meta); opacity: 0; transition: opacity 0.2s; }
        .sys-save.visible { opacity: 1; color: var(--cyan); }

        /* ========================================================================== */
        /* CORE UI ENGINE (STRUCTURAL DOM)                                            */
        /* ========================================================================== */
        #core-editor { width: 100%; display: flex; flex-direction: column; gap: 16px; position: relative; }

        .core-block {
            position: relative; display: flex; align-items: flex-start;
            width: 100%; min-height: 32px;
        }

        /* --- EDGE-BLEED RAIL --- */
        .core-rail {
            position: absolute; left: -20px; top: 0; bottom: 0; width: 20px;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        
        /* The Node */
        .core-node {
            width: 12px; height: 12px; background: var(--bg); border: 2px solid var(--grid);
            margin-top: 10px; cursor: pointer; transition: all 0.1s;
        }
        .core-block:focus-within .core-node, .core-block:hover .core-node { border-color: var(--meta); }
        .core-node:hover { background: var(--neon); border-color: var(--neon) !important; transform: scale(1.2); }

        /* --- CORE CONTENT WRAPPER --- */
        .core-content {
            flex-grow: 1; width: 100%; outline: none; position: relative;
        }

        /* --- OVERSIZED TYPOGRAPHY --- */
        .txt-base {
            font-size: 22px; font-weight: 400; line-height: 1.4;
            letter-spacing: -0.02em; word-wrap: break-word; white-space: pre-wrap;
            outline: none; color: var(--fg);
        }
        .txt-base[data-empty="true"]::before {
            content: attr(data-placeholder); color: var(--meta); pointer-events: none; position: absolute;
        }
        
        .txt-h1 { font-size: 44px; font-weight: 900; letter-spacing: -0.04em; line-height: 1.1; margin-top: 24px; text-transform: uppercase; }
        .txt-h2 { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; margin-top: 16px; }

        /* Core List & Task Styles */
        .core-list { display: flex; align-items: flex-start; }
        .core-list::before { content: "-"; font-family: var(--font-mono); font-weight: 800; font-size: 22px; margin-right: 16px; color: var(--neon); }
        
        .core-task { display: flex; align-items: flex-start; }
        .task-box {
            width: 22px; height: 22px; border: 2px solid var(--fg); margin-right: 16px; margin-top: 4px;
            cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .task-box.checked { background: var(--cyan); border-color: var(--cyan); }
        .task-box.checked::after { content: '✕'; font-family: var(--font-mono); font-size: 16px; font-weight: 900; color: #000; }
        .core-task.checked .txt-base { text-decoration: line-through; color: var(--meta); }

        /* --- AI MACHINE BLOCK --- */
        .ai-wrapper { border: var(--border); background: var(--fg); color: var(--bg); display: flex; flex-direction: column; margin: 16px 0; }
        .ai-sys-header { background: var(--neon); color: #000; font-family: var(--font-mono); font-size: 12px; font-weight: 900; padding: 8px 16px; text-transform: uppercase; }
        .ai-content { padding: 24px; font-family: var(--font-mono); font-size: 16px; outline: none; }
        .ai-cursor { display: inline-block; width: 12px; height: 1em; background: var(--cyan); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 8px;}

        /* --- GLOBAL INLINE MENU --- */
        #core-menu {
            position: absolute; background: var(--bg); border: var(--border); display: none; z-index: 100;
        }
        #core-menu.show { display: flex; }
        .menu-btn {
            background: none; border: none; border-right: var(--border); font-family: var(--font-mono); font-size: 14px; font-weight: 800; 
            color: var(--fg); padding: 12px 16px; cursor: pointer; outline: none; text-transform: uppercase;
        }
        .menu-btn:last-child { border-right: none; }
        .menu-btn:hover { background: var(--fg); color: var(--bg); }
        .menu-btn.accent:hover { background: var(--neon); color: #fff; }
        .menu-btn.del:hover { background: #FF0055; color: #fff; }

        /* Add Block Sub-Menu Grid */
        #add-menu {
            position: absolute; background: var(--bg); border: var(--border);
            display: none; grid-template-columns: 1fr 1fr; z-index: 101; width: 240px;
        }
        #add-menu.show { display: grid; }
        .add-btn {
            background: none; border: none; padding: 16px; font-family: var(--font-mono); font-size: 14px; font-weight: 800;
            text-align: left; cursor: pointer; border-bottom: var(--border); border-right: var(--border); text-transform: uppercase; color: var(--fg); outline: none;
        }
        .add-btn:nth-child(even) { border-right: none; }
        .add-btn:nth-last-child(-n+2) { border-bottom: none; }
        .add-btn:hover { background: var(--cyan); color: #000; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .end-pad { height: 40vh; width: 100%; cursor: text; }

    </style>
</head>
<body>

    <div class="app-container" id="app-container">
        <div id="date-header" class="date-header"></div>
        <div class="sys-bar">
            <div id="ai-status" class="sys-ai loading">sys.boot...</div>
            <div id="save-status" class="sys-save">sync.ok</div>
        </div>

        <div id="core-editor"></div>
        <div class="end-pad" onclick="window.editor.addEndBlock()"></div>
    </div>

    <!-- The Singular Context Menu -->
    <div id="core-menu">
        <button class="menu-btn accent" onclick="window.editor.showAddMenu()">+</button>
        <button class="menu-btn" onclick="window.editor.moveNode(-1)">↑</button>
        <button class="menu-btn" onclick="window.editor.moveNode(1)">↓</button>
        <button class="menu-btn del" onclick="window.editor.deleteNode()">✕</button>
    </div>

    <div id="add-menu">
        <button class="add-btn" onclick="window.editor.injectBlock('paragraph')">txt</button>
        <button class="add-btn" onclick="window.editor.injectBlock('task')">task</button>
        <button class="add-btn" onclick="window.editor.injectBlock('list')">list</button>
        <button class="add-btn" onclick="window.editor.injectBlock('h1')">h1</button>
        <button class="add-btn" onclick="window.editor.injectBlock('h2')">h2</button>
    </div>

    <script type="module">
        const CONFIG = {
            AI_NAME: "nova", 
            AI_PERSONALITY: "You are an integrated system AI. Output pure raw markdown. Be highly concise.",
            PWA_LOGO_URL: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzAwMDAwMCI+PHBhdGggZD0iTTE0IDJINmEyIDIgMCAwIDAtMiAydjE2YTIgMiAwIDAgMCAyIDJoMTJhMiAyIDAgMCAwIDItMlY4bC02LTZ6Ii8+PC9zdmc+"
        };

        document.getElementById('pwa-icon').href = CONFIG.PWA_LOGO_URL;
        document.getElementById('pwa-manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify({
            "name": "Notes", "short_name": "Notes", "start_url": ".", "display": "standalone",
            "background_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#000000" : "#ffffff",
            "theme_color": window.matchMedia('(prefers-color-scheme: dark)').matches ? "#000000" : "#ffffff",
            "icons": [{"src": CONFIG.PWA_LOGO_URL, "sizes": "192x192", "type": "image/svg+xml"}]
        }));

        function getLocalYYYYMMDD(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

        // ============================================================================
        // 💾 LEAN STORAGE
        // ============================================================================
        class DualStorageAdapter {
            constructor() { this.cache = {}; this.saveQueue = Promise.resolve(); }
            init() {
                return new Promise((resolve) => {
                    const req = indexedDB.open('OversizeNotesDB', 1);
                    req.onupgradeneeded = (e) => { if (!e.target.result.objectStoreNames.contains('notes')) e.target.result.createObjectStore('notes'); };
                    req.onsuccess = (e) => { this.db = e.target.result; this.loadAll().then(data => { this.cache = data; resolve(); }); };
                    req.onerror = () => resolve();
                });
            }
            save(dateStr, data) {
                this.cache[dateStr] = data;
                try { localStorage.setItem(`os_${dateStr}`, JSON.stringify(data)); } catch(e) {}
                if (!this.db) return Promise.resolve();
                this.saveQueue = this.saveQueue.then(() => new Promise((resolve, reject) => {
                    const tx = this.db.transaction('notes', 'readwrite');
                    const req = tx.objectStore('notes').put(data, dateStr);
                    req.onsuccess = () => resolve(); req.onerror = () => reject();
                })).catch(err => console.error("Save Err", err));
                return this.saveQueue;
            }
            loadAll() {
                return new Promise(resolve => {
                    const res = {};
                    for(let i=0; i<localStorage.length; i++) { const k = localStorage.key(i); if (k && k.startsWith('os_')) { try { res[k.replace('os_', '')] = JSON.parse(localStorage.getItem(k)); } catch(e) {} } }
                    if (!this.db) return resolve(res);
                    const tx = this.db.transaction('notes', 'readonly');
                    const vReq = tx.objectStore('notes').getAll(); const kReq = tx.objectStore('notes').getAllKeys();
                    tx.oncomplete = () => { if (kReq.result && vReq.result) { kReq.result.forEach((key, i) => res[key] = vReq.result[i]); } resolve(res); };
                    tx.onerror = () => resolve(res);
                });
            }
        }
        const appDB = new DualStorageAdapter();

        // ============================================================================
        // 🧠 ON-DEVICE AI
        // ============================================================================
        const AI_MODEL_ID = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 
        let aiEngine = null;
        
        async function initializeAI() {
            const statusEl = document.getElementById('ai-status');
            try {
                const { CreateMLCEngine } = await import("https://esm.run/@mlc-ai/web-llm");
                aiEngine = await CreateMLCEngine(AI_MODEL_ID, { initProgressCallback: (p) => { statusEl.textContent = `sys.dl... ${Math.round(p.progress * 100)}%`; } });
                statusEl.className = 'sys-ai'; statusEl.textContent = `${CONFIG.AI_NAME}.rdy`;
            } catch (err) { statusEl.className = 'sys-ai error'; statusEl.textContent = 'sys.err'; }
        }
        setTimeout(initializeAI, 1000);

        // ============================================================================
        // 🏗️ THE "CORE UI" FACTORY
        // ============================================================================
        const CoreUI = {
            el(tag, className, attrs = {}) {
                const e = document.createElement(tag); if (className) e.className = className;
                for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
                return e;
            },
            
            // Wraps ANY block content in the universal structure (Rail + Node + Container)
            wrapBlock(data, contentNode, editorInstance) {
                const wrap = this.el('div', 'core-block', { 'data-id': data.id, 'data-type': data.type });
                
                // Rail & Node (Always edge-bleeding)
                if (!editorInstance.readOnly) {
                    const rail = this.el('div', 'core-rail');
                    const node = this.el('div', 'core-node');
                    node.onclick = (e) => { e.stopPropagation(); editorInstance.openNodeMenu(data.id, node); };
                    rail.appendChild(node);
                    wrap.appendChild(rail);
                }

                // Standard Content Container
                const contentContainer = this.el('div', 'core-content');
                contentContainer.appendChild(contentNode);
                wrap.appendChild(contentContainer);

                return wrap;
            }
        };

        // ============================================================================
        // 🧩 BLOCK DEFINITIONS (Clean, isolated data handlers)
        // ============================================================================
        const BlockDefs = {
            _createTextBase(data, editor) {
                const text = CoreUI.el('div', 'txt-base', { contentEditable: !editor.readOnly, 'data-placeholder': `call @${CONFIG.AI_NAME}...` });
                text.innerHTML = data.text || '';
                text.dataset.empty = text.textContent.trim() === '';
                
                if (!editor.readOnly) {
                    text.addEventListener('input', () => { text.dataset.empty = text.textContent.trim() === ''; window.save(); });
                    text.addEventListener('keydown', (e) => editor.handleTextKeydown(e, data.id, text));
                }
                return text;
            },

            paragraph: {
                render: (data, editor) => BlockDefs._createTextBase(data, editor),
                extract: (dom) => dom.innerHTML
            },
            h1: {
                render: (data, editor) => {
                    const el = BlockDefs._createTextBase(data, editor);
                    el.classList.add('txt-h1'); return el;
                },
                extract: (dom) => dom.innerHTML
            },
            h2: {
                render: (data, editor) => {
                    const el = BlockDefs._createTextBase(data, editor);
                    el.classList.add('txt-h2'); return el;
                },
                extract: (dom) => dom.innerHTML
            },
            list: {
                render: (data, editor) => {
                    const container = CoreUI.el('div', 'core-list');
                    const text = BlockDefs._createTextBase(data, editor);
                    container.appendChild(text);
                    // Return container, but expose text for cursor logic
                    container._activeDom = text; 
                    return container;
                },
                extract: (dom) => dom.querySelector('.txt-base').innerHTML
            },
            task: {
                render: (data, editor) => {
                    const container = CoreUI.el('div', `core-task ${data.checked ? 'checked' : ''}`);
                    const check = CoreUI.el('div', `task-box ${data.checked ? 'checked' : ''}`);
                    const text = BlockDefs._createTextBase(data, editor);
                    
                    if (!editor.readOnly) {
                        check.onclick = () => { 
                            data.checked = !data.checked; check.classList.toggle('checked'); 
                            container.classList.toggle('checked'); window.save();
                        };
                    }
                    container.append(check, text);
                    container._activeDom = text;
                    return container;
                },
                extract: (dom) => dom.querySelector('.txt-base').innerHTML
            },
            ai: {
                render: (data, editor) => {
                    const wrapper = CoreUI.el('div', 'ai-wrapper');
                    const header = CoreUI.el('div', 'ai-sys-header'); header.textContent = `sys.ai // ${data.prompt}`;
                    const text = CoreUI.el('div', 'ai-content txt-base', { contentEditable: !editor.readOnly });
                    text.innerHTML = data.text || '';
                    wrapper.append(header, text);
                    wrapper._activeDom = text;
                    return wrapper;
                },
                extract: (dom) => dom.querySelector('.ai-content').innerHTML
            }
        };

        // ============================================================================
        // 🏛️ MAIN EDITOR ENGINE
        // ============================================================================
        class CoreEngine {
            constructor(containerId, initialData, isReadOnly) {
                this.container = document.getElementById(containerId);
                this.readOnly = isReadOnly;
                this.blocks = initialData.blocks || [];
                this.activeMenuNodeId = null;
                
                this.menuDom = document.getElementById('core-menu');
                this.addMenuDom = document.getElementById('add-menu');
                
                this.init();
            }

            init() {
                this.container.innerHTML = '';
                if (this.blocks.length === 0) this.blocks.push({ id: crypto.randomUUID(), type: 'paragraph', text: '' });
                this.blocks.forEach((data) => this.renderBlockToDOM(data));
            }

            renderBlockToDOM(data, insertBeforeNode = null) {
                const def = BlockDefs[data.type];
                if (!def) return;

                const contentNode = def.render(data, this);
                const wrapper = CoreUI.wrapBlock(data, contentNode, this);

                data._wrap = wrapper;
                data._dom = contentNode._activeDom || contentNode; // Keep reference to the typing area

                if (insertBeforeNode) this.container.insertBefore(wrapper, insertBeforeNode);
                else this.container.appendChild(wrapper);
            }

            // --- UI Interactions ---

            openNodeMenu(id, nodeEl) {
                this.activeMenuNodeId = id;
                const rect = nodeEl.getBoundingClientRect();
                this.menuDom.style.top = `${rect.top + window.scrollY - 10}px`;
                this.menuDom.style.left = `${rect.left + window.scrollX + 24}px`;
                this.menuDom.classList.add('show');
                this.addMenuDom.classList.remove('show');
            }

            showAddMenu() {
                const rect = this.menuDom.getBoundingClientRect();
                this.addMenuDom.style.top = `${rect.bottom + window.scrollY}px`;
                this.addMenuDom.style.left = `${rect.left + window.scrollX}px`;
                this.addMenuDom.classList.add('show');
            }

            moveNode(dir) {
                const i = this.blocks.findIndex(b => b.id === this.activeMenuNodeId); if (i < 0) return;
                if (dir === -1 && i > 0) {
                    const t = this.blocks[i]; this.blocks[i] = this.blocks[i-1]; this.blocks[i-1] = t;
                    this.container.insertBefore(this.blocks[i]._wrap, this.blocks[i+1]._wrap); window.save();
                } else if (dir === 1 && i < this.blocks.length - 1) {
                    const t = this.blocks[i]; this.blocks[i] = this.blocks[i+1]; this.blocks[i+1] = t;
                    this.container.insertBefore(this.blocks[i]._wrap, this.blocks[i-1]._wrap); window.save();
                }
                window.closeUI();
            }

            deleteNode() {
                const i = this.blocks.findIndex(b => b.id === this.activeMenuNodeId); if (i < 0) return;
                this.blocks[i]._wrap.remove(); this.blocks.splice(i, 1);
                if (this.blocks.length === 0) this.addEndBlock(); 
                window.save(); window.closeUI();
            }

            injectBlock(type) {
                const i = this.blocks.findIndex(b => b.id === this.activeMenuNodeId); if (i < 0) return;
                window.closeUI();
                
                const nb = { id: crypto.randomUUID(), type: type, text: '' };
                if (type === 'task') nb.checked = false;
                
                this.blocks.splice(i + 1, 0, nb);
                const before = i + 1 < this.blocks.length - 1 ? this.blocks[i + 2]._wrap : null;
                this.renderBlockToDOM(nb, before);
                
                setTimeout(() => nb._dom.focus(), 10);
                window.save();
            }

            addEndBlock() {
                if (this.readOnly) return;
                const nb = { id: crypto.randomUUID(), type: 'paragraph', text: '' };
                this.blocks.push(nb); this.renderBlockToDOM(nb);
                setTimeout(() => nb._dom.focus(), 10); window.save();
            }

            // --- Typing Logic ---

            handleTextKeydown(e, id, domNode) {
                const i = this.blocks.findIndex(b => b.id === id);
                const b = this.blocks[i]; const t = domNode.textContent;

                // BACKSPACE
                if (e.key === 'Backspace' && t === '') {
                    e.preventDefault();
                    if (b.type !== 'paragraph') {
                        b.type = 'paragraph'; const old = b._wrap;
                        this.renderBlockToDOM(b, old.nextSibling); old.remove(); window.save();
                        setTimeout(() => b._dom.focus(), 10);
                    } else if (this.blocks.length > 1) { 
                        this.activeMenuNodeId = id; this.deleteNode(); 
                        if (i > 0) this.caretEnd(this.blocks[i - 1]._dom);
                    }
                    return;
                }

                // ENTER
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    
                    // AI Intercept
                    const trigger = `@${CONFIG.AI_NAME.toLowerCase()} `;
                    if (t.toLowerCase().startsWith(trigger)) {
                        const p = t.substring(trigger.length).trim();
                        if (!p) return; if (!aiEngine) return alert('sys.ai offline');
                        b.type = 'ai'; b.prompt = p; b.text = '';
                        const old = b._wrap; this.renderBlockToDOM(b, old.nextSibling); old.remove();
                        this.runAI(b); return;
                    }
                    
                    const inherit = (b.type === 'list' || b.type === 'task') ? b.type : 'paragraph';
                    const nb = { id: crypto.randomUUID(), type: inherit, text: '' };
                    if (inherit === 'task') nb.checked = false;
                    
                    this.blocks.splice(i + 1, 0, nb);
                    const before = i + 1 < this.blocks.length - 1 ? this.blocks[i + 2]._wrap : null;
                    this.renderBlockToDOM(nb, before); 
                    setTimeout(() => nb._dom.focus(), 10);
                    window.save();
                }
            }

            caretEnd(el) {
                el.focus();
                if (window.getSelection && document.createRange) {
                    const r = document.createRange(); r.selectNodeContents(el); r.collapse(false);
                    const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
                }
            }

            // --- AI Stream ---
            async runAI(b) {
                const c = CoreUI.el('span', 'ai-cursor'); b._dom.appendChild(c);
                const sys = `You are ${CONFIG.AI_NAME}. ${CONFIG.AI_PERSONALITY}\nContext:\n${this.save().blocks.map(bl => bl.text || bl.prompt || '').join('\n')}`;
                try {
                    const chunks = await aiEngine.chat.completions.create({ messages: [{ role: "system", content: sys }, { role: "user", content: b.prompt }], stream: true });
                    b.text = '';
                    for await (const chunk of chunks) {
                        b.text += chunk.choices[0]?.delta?.content || "";
                        b._dom.textContent = b.text; b._dom.appendChild(c);
                    }
                    c.remove(); window.save();
                } catch(e) { b._dom.textContent = "err: " + e.message; c.remove(); }
            }

            save() {
                const clean = this.blocks.map(b => {
                    const base = { id: b.id, type: b.type, text: BlockDefs[b.type].extract(b._wrap) };
                    if (b.type === 'task') base.checked = b.checked;
                    if (b.type === 'ai') base.prompt = b.prompt;
                    return base;
                });
                return { blocks: clean };
            }
        }

        // ============================================================================
        // APP LIFECYCLE
        // ============================================================================
        let saveTimeout;
        let todayStr = getLocalYYYYMMDD(new Date()); window.currentDateStr = todayStr;

        document.getElementById('date-header').innerHTML = `${new Date().toLocaleDateString(undefined, { month: 'short', day: '2-digit' })}<br>${new Date().toLocaleDateString(undefined, { weekday: 'long' })}`;

        window.closeUI = function() {
            document.getElementById('core-menu').classList.remove('show');
            document.getElementById('add-menu').classList.remove('show');
        };
        document.addEventListener('click', window.closeUI);

        window.save = function() {
            if (!window.editor) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                appDB.save(window.currentDateStr, window.editor.save()).then(() => {
                    const ind = document.getElementById('save-status');
                    ind.classList.add('visible'); setTimeout(() => ind.classList.remove('visible'), 1000);
                });
            }, 600);
        };

        appDB.init().then(() => { 
            window.editor = new CoreEngine('core-editor', appDB.cache[window.currentDateStr] || { blocks: [] }, false); 
        });
        
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') window.save(); });
        window.addEventListener('pagehide', () => window.save());

    </script>
</body>
</html>
