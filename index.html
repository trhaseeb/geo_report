<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL NOTES</title>
    
    <!-- Core Markdown Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <style>
        :root { --bg: #f4f4f0; --fg: #111111; }
        @media (prefers-color-scheme: dark) { :root { --bg: #111111; --fg: #f4f4f0; } }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            background-color: var(--bg); color: var(--fg);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden; line-height: 1.6;
        }

        ::selection { background-color: var(--fg); color: var(--bg); }
        ::-webkit-scrollbar { width: 14px; height: 14px; border-left: 4px solid var(--fg); }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--fg); }

        header { padding: 1.5rem 1.5rem 0 1.5rem; border-bottom: 6px solid var(--fg); flex-shrink: 0; user-select: none; }

        .header-title {
            font-size: clamp(3rem, 9vw, 7rem); font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.06em; line-height: 0.8; padding-bottom: 0.5rem;
            cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 0.1s;
        }
        .header-title:hover { color: #888888; }
        .header-title.is-root { cursor: default; }
        .header-title.is-root:hover { color: var(--fg); }

        .sub-header { padding: 0.5rem 1.5rem 1.5rem 1.5rem; flex-shrink: 0; user-select: none; display: flex; flex-wrap: wrap; gap: 1rem; }

        .mode-link {
            font-family: inherit; font-size: clamp(0.75rem, 1.5vw, 1rem); font-weight: 900;
            color: var(--fg); text-transform: uppercase; text-decoration: none; cursor: pointer;
            transition: all 0.1s; opacity: 0.6; white-space: nowrap;
        }
        .mode-link:hover { opacity: 1; text-decoration: underline; text-decoration-thickness: 3px; text-underline-offset: 4px; }

        main { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }

        .workspace-pane {
            position: absolute; inset: 0; width: 100%; height: 100%; padding: clamp(1.5rem, 5vw, 3rem);
            overflow-y: auto; background: transparent; border: none; color: inherit; font-family: inherit;
            font-size: clamp(1rem, 2vw, 1.25rem); outline: none; font-weight: 500; resize: none;
        }

        .workspace-content { max-width: 56rem; margin: 0 auto; width: 100%; min-height: 100%; padding-bottom: 20vh; }
        .hidden { display: none !important; }
        .ghost-text { color: #aaaaaa; pointer-events: none; user-select: none; }

        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 {
            font-family: inherit; text-transform: uppercase; font-weight: 900;
            letter-spacing: -0.05em; margin-top: 1.5em; margin-bottom: 0.5em; line-height: 1.1;
        }
        .prose > *:first-child { margin-top: 0; }
        .prose h1 { font-size: 2.25em; }
        .prose h2 { font-size: 1.8em; }
        .prose h3 { font-size: 1.5em; }
        .prose p, .prose ul, .prose ol { margin-bottom: 1em; }
        .prose ul, .prose ol { padding-left: 1.5em; }
        .prose a { color: var(--fg); font-weight: 900; text-decoration: underline; text-decoration-thickness: 3px; text-underline-offset: 4px; cursor: pointer; }
        .prose a:hover { background-color: var(--fg); color: var(--bg); }
        .prose blockquote { border-left: 8px solid var(--fg); padding: 0.5em 1.5em; background: rgba(128, 128, 128, 0.1); margin: 0; font-weight: bold; }
        .prose hr { border: none; border-top: 4px solid var(--fg); margin: 2em 0; }
        .prose code { border: 2px solid var(--fg); padding: 0.1em 0.3em; font-size: 0.9em; }
        .prose pre { border: 4px solid var(--fg); padding: 1em; overflow-x: auto; margin-bottom: 1em; }
        .prose table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; border: 4px solid var(--fg); }
        .prose th, .prose td { border: 2px solid var(--fg); padding: 0.75em; text-align: left; }
        .prose th { background-color: var(--fg); color: var(--bg); text-transform: uppercase; font-weight: 900; }

        #live-editor:empty:before { content: attr(placeholder); color: #888; pointer-events: none; }
        .prose p:empty:before, .prose h1:empty:before, .prose h2:empty:before, .prose h3:empty:before { content: "\200B"; }
    </style>
</head>
<body>

    <header>
        <h1 id="date-title" class="header-title">Loading...</h1>
    </header>
    <div class="sub-header">
        <a href="#" id="mode-toggle" class="mode-link">Mode: Live</a>
    </div>

    <main>
        <!-- Notice contenteditable is initially false while DB initializes -->
        <div id="live-editor" contenteditable="false" class="workspace-pane prose workspace-content" placeholder="Start typing naturally..." spellcheck="false"></div>
        <textarea id="raw-editor" class="workspace-pane workspace-content hidden" placeholder="Start typing raw markdown here..." spellcheck="false"></textarea>
        <div id="read-preview" class="workspace-pane prose workspace-content hidden"></div>
    </main>
    
    <!-- Changed to module to support ESM imports for PGLite -->
    <script type="module">
        import { PGlite } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite@0.4.4/+esm";
        import { vector } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite@0.4.4/vector/+esm";

        const liveEditor = document.getElementById('live-editor');
        const rawEditor = document.getElementById('raw-editor');
        const readPreview = document.getElementById('read-preview');
        const modeToggle = document.getElementById('mode-toggle');
        const dateTitle = document.getElementById('date-title');
        
        const modes = ['Live', 'Raw', 'Read'];
        let currentModeIndex = 0; 
        let notes = {};
        let currentKey = '';
        let saveTimeout;
        const VIRTUAL_PAGES = ['index', 'diary', 'tags'];

        let currentGhostSuggestion = null;
        let ghostNode = null;
        let db = null;

        // =========================================================================
        // 🧠 RAG & LOCAL LLM PREPARATION (FOR NEXT PHASE)
        // =========================================================================

        /**
         * Call this to save a new vector embedding generated by your LLM for a specific note.
         * @param {string} id - The note's key/date
         * @param {number[]} embeddingArray - The output vector from the LLM (e.g., length 384)
         */
        async function updateNoteEmbedding(id, embeddingArray) {
            if (!db) return;
            try {
                // Vector extension expects standard JSON array structure as string '[0.1, 0.2, ...]'
                const vectorString = JSON.stringify(embeddingArray);
                await db.query(`UPDATE notes SET embedding = $1 WHERE id = $2`, [vectorString, id]);
            } catch(e) {
                console.error("Failed to update embedding:", e);
            }
        }

        /**
         * Call this to find the most relevant notes to an incoming prompt or tag search.
         */
        async function searchSimilarNotes(embeddingArray, limit = 5) {
            if (!db) return [];
            try {
                const vectorString = JSON.stringify(embeddingArray);
                // The `<=>` operator computes cosine distance. We subtract from 1 to get similarity.
                const res = await db.query(`
                    SELECT id, content, 1 - (embedding <=> $1) AS similarity
                    FROM notes
                    WHERE embedding IS NOT NULL
                    ORDER BY embedding <=> $1
                    LIMIT $2;
                `, [vectorString, limit]);
                return res.rows;
            } catch(e) {
                console.error("Vector search failed:", e);
                return [];
            }
        }

        // =========================================================================
        // 🗄️ DATABASE & STATE LOGIC
        // =========================================================================

        async function saveNoteToDB(id, content) {
            if (VIRTUAL_PAGES.includes(id)) return;
            if (!db) return;
            try {
                await db.query(`
                    INSERT INTO notes (id, content)
                    VALUES ($1, $2)
                    ON CONFLICT (id) DO UPDATE 
                    SET content = EXCLUDED.content, updated_at = CURRENT_TIMESTAMP;
                `, [id, content]);
            } catch (err) {
                console.error("Failed to save note to DB:", err);
            }
        }

        async function flushLiveSave() {
            if (modes[currentModeIndex] === 'Live' && !VIRTUAL_PAGES.includes(currentKey)) {
                const keyToSave = currentKey; // Capture synchronously
                let markdown = turndownService.turndown(liveEditor.innerHTML).replace(/\u00A0/g, ' ');
                if (!markdown.trim() || markdown === '\\') markdown = ''; 
                notes[keyToSave] = markdown;
                await saveNoteToDB(keyToSave, markdown);
            }
        }

        // --- Core Helpers ---

        function parseMD(text) {
            return DOMPurify.sanitize(marked.parse(text), { ADD_TAGS: ['table', 'th', 'tr', 'td', 'thead', 'tbody'] });
        }

        function removeGhost() {
            if (ghostNode && ghostNode.parentNode) ghostNode.parentNode.removeChild(ghostNode);
            ghostNode = null; currentGhostSuggestion = null;
        }

        marked.use({
            gfm: true,
            extensions: [{
                name: 'hashtag',
                level: 'inline',
                start(src) { const match = src.match(/(^|\s)#([a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)/); return match ? match.index : undefined; },
                tokenizer(src) {
                    const match = /^(\s?)#([a-zA-Z0-9_]+)(?:\.([a-zA-Z0-9_]+))?/.exec(src);
                    if (match) return { type: 'hashtag', raw: match[0], space: match[1], baseTag: match[2], fullTag: match[3] ? `${match[2]}.${match[3]}` : match[2] };
                },
                renderer(token) { return `${token.space}<a href="#tag-${token.baseTag.toLowerCase()}">#${token.fullTag}</a>`; }
            }]
        });

        const turndownService = new TurndownService({ headingStyle: 'atx', bulletListMarker: '-', codeBlockStyle: 'fenced' });
        turndownService.addRule('hashtag', { filter: (n) => n.nodeName === 'A' && n.getAttribute('href')?.startsWith('#tag-'), replacement: (c) => c });
        turndownService.addRule('ghostText', { filter: (n) => n.nodeName === 'SPAN' && n.classList.contains('ghost-text'), replacement: () => '' });

        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function formatDateDisplay(key) {
            const [y, m, d] = key.split('-');
            return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function getAllKnownTags() {
            let tagSet = new Set();
            for (let k in notes) {
                if (VIRTUAL_PAGES.includes(k)) continue;
                const matches = notes[k].match(/(?:^|\s)(#[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)?)\b/g);
                if (matches) matches.forEach(m => tagSet.add(m.trim()));
            }
            return Array.from(tagSet).sort();
        }

        function updateModeUI() {
            const mode = modes[currentModeIndex];
            modeToggle.innerText = `[ Mode: ${mode} ]`;
            
            liveEditor.classList.add('hidden'); rawEditor.classList.add('hidden'); readPreview.classList.add('hidden');
            let rawMarkdown = notes[currentKey] || '';

            if (mode === 'Live') {
                liveEditor.innerHTML = parseMD(rawMarkdown);
                liveEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) liveEditor.focus();
            } else if (mode === 'Raw') {
                rawEditor.value = rawMarkdown;
                rawEditor.classList.remove('hidden');
                if (!VIRTUAL_PAGES.includes(currentKey)) rawEditor.focus();
            } else if (mode === 'Read') {
                readPreview.innerHTML = parseMD(rawMarkdown);
                readPreview.classList.remove('hidden');
            }
        }

        // --- Virtual Pages ---

        function loadIndex() {
            flushLiveSave(); currentKey = 'index';
            notes['index'] = `*Root Directory*\n\n- [Diary](#diary)\n- [Tags](#tags)`;
            dateTitle.innerText = 'Index'; dateTitle.classList.add('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadDiary() {
            flushLiveSave(); currentKey = 'diary';
            const links = Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse().map(k => `- [${formatDateDisplay(k)}](#${k})`).join('\n');
            notes['diary'] = `*All daily notes.*\n\n${links || '*No notes yet.*'}`;
            dateTitle.innerText = 'Diary'; dateTitle.classList.remove('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadTags() {
            flushLiveSave(); currentKey = 'tags';
            const tags = new Set();
            Object.keys(notes).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).forEach(k => {
                const matches = notes[k].match(/(?:^|\s)#([a-zA-Z0-9_]+)(?:\.[a-zA-Z0-9_]+)?\b/g);
                if (matches) matches.forEach(m => tags.add(m.trim().substring(1).toLowerCase().split('.')[0]));
            });
            const tagLinks = Array.from(tags).sort().map(t => `- [#${t}](#tag-${t})`).join('\n') || "*No hashtags used yet.*";
            notes['tags'] = `*All tags used across notes.*\n\n${tagLinks}`;
            dateTitle.innerText = 'Tags'; dateTitle.classList.remove('is-root');
            currentModeIndex = 2; updateModeUI();
        }

        function loadNote(key) {
            flushLiveSave(); currentKey = key;
            if (notes[key] === undefined) {
                notes[key] = key.startsWith('tag-') ? `*Write notes for this tag here.*` : '';
                saveNoteToDB(key, notes[key]);
            }
            dateTitle.classList.remove('is-root');
            dateTitle.innerText = key.startsWith('tag-') ? '#' + key.substring(4).toUpperCase() : formatDateDisplay(key);
            currentModeIndex = key.startsWith('tag-') ? 2 : 0;
            updateModeUI();
        }

        // --- Event Listeners ---

        modeToggle.addEventListener('click', (e) => {
            e.preventDefault(); 
            flushLiveSave();
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            updateModeUI();
        });

        liveEditor.addEventListener('mousedown', removeGhost);
        liveEditor.addEventListener('blur', removeGhost);

        liveEditor.addEventListener('keydown', (e) => {
            if ((e.key === 'Tab' || e.key === 'ArrowRight') && currentGhostSuggestion) {
                e.preventDefault();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const node = sel.focusNode;
                    const match = node.textContent.substring(0, sel.focusOffset).match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    removeGhost(); 
                    if (match) {
                        const range = document.createRange();
                        range.setStart(node, sel.focusOffset - match[1].length);
                        range.setEnd(node, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('insertHTML', false, `<a href="#tag-${currentGhostSuggestion.substring(1).split('.')[0].toLowerCase()}">${currentGhostSuggestion}</a>&nbsp;`);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                } else removeGhost();
                return;
            }

            if (e.key === 'Escape' || e.key.startsWith('Arrow')) removeGhost();

            if (e.key === ' ') {
                removeGhost();
                const sel = window.getSelection();
                if (sel.rangeCount > 0 && sel.focusNode.nodeType === Node.TEXT_NODE) {
                    const text = sel.focusNode.textContent.substring(0, sel.focusOffset);
                    
                    const tagMatch = text.match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
                    if (tagMatch) {
                        e.preventDefault();
                        const range = document.createRange();
                        range.setStart(sel.focusNode, sel.focusOffset - tagMatch[1].length);
                        range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('insertHTML', false, `<a href="#tag-${tagMatch[1].substring(1).split('.')[0].toLowerCase()}">${tagMatch[1]}</a>&nbsp;`);
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                        return; 
                    }

                    const hMatch = text.match(/^(#{1,6})$/);
                    if (hMatch || text === '>' || text === '-' || text === '1.') {
                        e.preventDefault(); 
                        const range = document.createRange();
                        range.setStart(sel.focusNode, 0); range.setEnd(sel.focusNode, sel.focusOffset);
                        sel.removeAllRanges(); sel.addRange(range);
                        document.execCommand('delete', false, null);
                        
                        if (hMatch) document.execCommand('formatBlock', false, `<H${hMatch[1].length}>`);
                        else if (text === '>') document.execCommand('formatBlock', false, `<BLOCKQUOTE>`);
                        else if (text === '-') document.execCommand('insertUnorderedList', false, null);
                        else document.execCommand('insertOrderedList', false, null);
                        
                        clearTimeout(saveTimeout); saveTimeout = setTimeout(flushLiveSave, 50);
                    }
                }
            }
        });

        liveEditor.addEventListener('input', () => {
            removeGhost();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(flushLiveSave, 500);

            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0 || sel.focusNode.nodeType !== Node.TEXT_NODE) return;

            const match = sel.focusNode.textContent.substring(0, sel.focusOffset).match(/(?:^|\s)(#[a-zA-Z0-9_.]+)$/);
            if (match && match[1].length >= 2) {
                const typingTag = match[1];
                const suggestion = getAllKnownTags().find(t => t.toLowerCase().startsWith(typingTag.toLowerCase()) && t.length > typingTag.length);
                if (suggestion) {
                    currentGhostSuggestion = typingTag + suggestion.substring(typingTag.length); 
                    ghostNode = document.createElement('span');
                    ghostNode.className = 'ghost-text';
                    ghostNode.textContent = suggestion.substring(typingTag.length);
                    ghostNode.contentEditable = 'false';
                    
                    const range = sel.getRangeAt(0);
                    range.insertNode(ghostNode);
                    range.setStartBefore(ghostNode);
                    range.collapse(true);
                    sel.removeAllRanges(); sel.addRange(range);
                }
            }
        });

        rawEditor.addEventListener('input', () => {
            if (!VIRTUAL_PAGES.includes(currentKey)) {
                notes[currentKey] = rawEditor.value;
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    if (db) saveNoteToDB(currentKey, rawEditor.value);
                }, 500);
            }
        });

        function handleLinkClick(e) {
            let target = e.target;
            while (target && target.tagName !== 'A' && target !== this) target = target.parentElement;
            if (target && target.tagName === 'A') {
                const href = target.getAttribute('href');
                if (href) {
                    e.preventDefault();
                    if (href === '#diary') loadDiary();
                    else if (href === '#tags') loadTags();
                    else loadNote(href.substring(1));
                }
            }
        }
        
        liveEditor.addEventListener('click', handleLinkClick);
        readPreview.addEventListener('click', handleLinkClick);

        dateTitle.addEventListener('click', () => {
            if (currentKey === 'index') return;
            else if (VIRTUAL_PAGES.includes(currentKey)) loadIndex();
            else if (currentKey.startsWith('tag-')) loadTags();
            else loadDiary();
        });

        // =========================================================================
        // 🚀 BOOTSTRAPPER (Initialization without migration)
        // =========================================================================

        async function initApp() {
            try {
                dateTitle.innerText = "Connecting DB...";

                // Initialize PGLite with Persistent IndexedDB and pgvector extension
                db = new PGlite('idb://brutal-notes-db', {
                    extensions: { vector }
                });

                // Set up schema
                await db.exec(`
                    CREATE EXTENSION IF NOT EXISTS vector;
                    CREATE TABLE IF NOT EXISTS notes (
                        id TEXT PRIMARY KEY,
                        content TEXT,
                        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                        embedding vector(384)
                    );
                `);

                // Check database for existing records
                const allNotes = await db.query(`SELECT id, content FROM notes;`);

                if (allNotes.rows.length === 0) {
                    // Brand new setup
                    const todayKey = getTodayKey();
                    notes[todayKey] = `Welcome to your brutalist notebook.\n\nWe have successfully initialized the **PGLite** vector database to get you ready for local AI!.\n\n### Quick Start\n- Type \`#\` followed by a word to create a tag (e.g., #todo).\n- Type \`-\` and press space for a bulleted list.\n- Type \`#\` and press space for a heading.\n- Click the date at the top to access the index, diary, or your tags.`;
                    await saveNoteToDB(todayKey, notes[todayKey]);
                } else {
                    // Load everything into memory for instant navigation
                    allNotes.rows.forEach(row => {
                        notes[row.id] = row.content;
                    });
                }

                liveEditor.setAttribute('contenteditable', 'true');
                const todayKey = getTodayKey();
                loadNote(todayKey);

            } catch (error) {
                console.error("Database initialization failed:", error);
                dateTitle.innerText = "DB Error";
                liveEditor.innerHTML = `<p style="color:red; font-weight:bold;">Failed to initialize PGLite database. Your browser might be blocking IndexedDB.</p>`;
            }
        }

        // Modules defer execution after DOM is built, so we can just run it.
        initApp();
    </script>
</body>
</html>
