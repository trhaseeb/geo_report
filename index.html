<body>

    <div id="loader">Initializing Editor & Plugins...</div>
    <div id="editorjs"></div>

    <script>
        const STORAGE_KEY = 'ultimate_infinite_notes';

        const defaultData = {
            blocks: [
                { type: "header", data: { text: "The Ultimate Infinite Canvas", level: 1 } },
                { type: "paragraph", data: { text: "Welcome to your distraction-free void. The UI is completely hidden. Just scroll down and type forever." } },
                { type: "alert", data: { type: "success", message: "<b>Plugins Resiliently Loaded!</b> CodeFlask, Charts, and Drawing tools will appear in the '+' menu if your network successfully fetched them." } },
                { type: "paragraph", data: { text: "Try adding an <mark class=\"ce-annotation\" data-annotation=\"Annotations are basically hidden pop-up notes! Great for studying.\">Annotation</mark> by highlighting text and clicking the new speech-bubble icon." } },
                { type: "code", data: { code: "function welcome() {\n  console.log('CodeFlask adds line numbers and gorgeous syntax highlighting!');\n}\nwelcome();", language: "javascript" } },
                { type: "toggle", data: { text: "Click here to expand the full list of tools!", status: "closed", items: [
                    { type: "list", data: { style: "unordered", items: [
                        { content: "Drawing Tool (Sketch directly in your notes)", items: [] },
                        { content: "Charts & Graphs", items: [] },
                        { content: "Nested Lists (Press Tab inside a list!)", items: [] },
                        { content: "Text Color & Underline", items: [] }
                    ]}}
                ]}},
                { type: "delimiter", data: {} }
            ]
        };

        // --- SAFE CLASS RESOLVER ---
        // This function guarantees that if a plugin CDN link breaks, it won't crash the whole editor
        function resolvePluginClass(className) {
            if (typeof window[className] !== 'undefined') return window[className];
            try {
                const val = eval(className);
                if (typeof val !== 'undefined') return val;
            } catch (e) {
                // Plugin didn't load, ignore safely
            }
            return null;
        }

        function buildTools() {
            const tools = {};
            const inlineConfig = ['Marker', 'inlineCode', 'underline', 'Color', 'annotation', 'link'];

            // Helper to safely inject tools
            const addTool = (key, className, opts = {}) => {
                const pluginClass = resolvePluginClass(className);
                if (pluginClass) {
                    tools[key] = { class: pluginClass, ...opts };
                } else {
                    console.warn(`[DocBuilder] Skipped plugin '${key}': ${className} failed to load from CDN.`);
                }
            };

            // Register standard blocks
            addTool('header', 'Header', { inlineToolbar: inlineConfig, config: { levels: [1, 2, 3, 4], defaultLevel: 2 } });
            addTool('list', 'NestedList', { inlineToolbar: inlineConfig, config: { defaultStyle: 'unordered' } });
            addTool('checklist', 'Checklist', { inlineToolbar: inlineConfig });
            addTool('quote', 'Quote', { inlineToolbar: inlineConfig });
            addTool('embed', 'Embed', { inlineToolbar: true, config: { services: { youtube: true, codepen: true, twitter: true } } });
            addTool('table', 'Table', { inlineToolbar: inlineConfig });
            addTool('delimiter', 'Delimiter');
            addTool('warning', 'Warning', { inlineToolbar: inlineConfig });
            addTool('raw', 'RawTool');
            addTool('image', 'SimpleImage');
            addTool('alert', 'Alert', { inlineToolbar: inlineConfig, config: { defaultType: 'primary', messagePlaceholder: 'Enter callout text' } });
            addTool('toggle', 'ToggleBlock', { inlineToolbar: true });
            addTool('button', 'Button');
            
            // Advanced Blocks with Fallbacks
            const CodeClass = resolvePluginClass('editorjsCodeflask') || resolvePluginClass('CodeTool');
            if (CodeClass) tools.code = { class: CodeClass };

            const ChartClass = resolvePluginClass('ChartJS') || resolvePluginClass('EditorJSChart');
            if (ChartClass) tools.chart = { class: ChartClass };

            addTool('drawing', 'EditorJSDrawingTool');

            // Inline Tools
            addTool('Marker', 'Marker', { shortcut: 'CMD+SHIFT+M' });
            addTool('inlineCode', 'InlineCode', { shortcut: 'CMD+SHIFT+C' });
            addTool('underline', 'Underline', { shortcut: 'CMD+U' });
            addTool('annotation', 'Annotation');

            const ColorClass = resolvePluginClass('ColorPlugin');
            if (ColorClass) {
                tools.Color = {
                    class: ColorClass,
                    config: {
                        colorCollections: ['#EF4444','#F97316','#F59E0B','#10B981','#3B82F6','#6366F1','#8B5CF6','#EC4899','#111827','#6B7280'],
                        defaultColor: '#111827',
                        type: 'text',
                        customPicker: true
                    }
                };
            }

            return tools;
        }

        // Handle auto-save data loading
        let editorData = defaultData;
        let storageEnabled = false;
        try {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) editorData = JSON.parse(savedData);
            storageEnabled = true;
        } catch (error) {
            console.warn("Local storage disabled. Auto-saving turned off.");
        }

        // Initialize Editor safely
        try {
            const editor = new EditorJS({
                holder: 'editorjs',
                placeholder: 'Type \'/\' for commands or hit Tab...',
                data: editorData,
                tools: buildTools(),

                onReady: () => {
                    document.getElementById('loader').style.display = 'none';

                    // Safely init Undo & DragDrop
                    const UndoClass = resolvePluginClass('Undo');
                    if (UndoClass) new UndoClass({ editor });

                    const DragDropClass = resolvePluginClass('DragDrop');
                    if (DragDropClass) new DragDropClass(editor);
                    
                    console.log('Canvas loaded successfully!');
                },

                onChange: async () => {
                    if (!storageEnabled) return;
                    try {
                        const outputData = await editor.save();
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(outputData));
                    } catch (error) {
                        console.error('Failed to auto-save.', error);
                    }
                }
            });
        } catch (fatalError) {
            document.getElementById('loader').innerHTML = `
                <div style="color: #ef4444; font-weight: bold;">Fatal Setup Error</div>
                <div style="font-family: monospace; margin-top: 10px;">${fatalError.message}</div>
            `;
        }
    </script>
</body>
</html>
