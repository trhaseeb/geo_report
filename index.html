    <!-- Core App Logic -->
    <script type="module">
        import { PGlite } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js";
        import { vector } from "https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/vector/index.js";

        // ============================================================================
        // ⚙️ GLOBAL STATE
        // ============================================================================
        window.currentDateStr = null;
        window.cells = [];
        window.isPyodideReady = false;
        window.isReadOnlyView = false;
        
        let pyodide = null;
        let activeSavePromise = Promise.resolve();
        let saveTimeout = null;

        const ui = {
            header: document.getElementById('date-header'),
            container: document.getElementById('notebook-container'),
            controls: document.getElementById('notebook-controls'),
            saveInd: document.getElementById('save-indicator'),
            pyStatus: document.getElementById('py-status')
        };

        // ============================================================================
        // 💾 DATABASE & INDEXING (PGlite)
        // ============================================================================
        class PGLiteAdapter {
            constructor() { this.db = null; this.cache = {}; }
            async init() {
                try {
                    this.db = new PGlite('idb://infinite-code-pg', { extensions: { vector } });
                    await this.db.exec(`
                        CREATE EXTENSION IF NOT EXISTS vector; 
                        CREATE TABLE IF NOT EXISTS daily_notes (date_str TEXT PRIMARY KEY, data JSONB);
                    `);
                    await this.loadAll();
                } catch(e) { console.error("DB Init Failed", e); }
            }
            async save(keyStr, data) {
                this.cache[keyStr] = data; AppIndex.invalidate(); 
                if (!this.db) return;
                try { await this.db.query(`INSERT INTO daily_notes (date_str, data) VALUES ($1, $2) ON CONFLICT (date_str) DO UPDATE SET data = EXCLUDED.data;`, [keyStr, JSON.stringify(data)]); } catch(e) {}
            }
            async loadAll() {
                if (!this.db) return {};
                try { 
                    const res = await this.db.query(`SELECT date_str, data FROM daily_notes;`); 
                    const result = {}; 
                    res.rows.forEach(r => { result[r.date_str] = typeof r.data === 'string' ? JSON.parse(r.data) : r.data; }); 
                    this.cache = result; 
                } catch(e) {}
            }
        }
        window.appDB = new PGLiteAdapter();

        // 🏷️ Tag Extraction Index
        const AppIndex = {
            tags: new Set(), blocksByTagRoot: {}, isBuilt: false,
            build: function() {
                this.tags.clear(); this.blocksByTagRoot = {};
                const regex = /(?:^|\s)(@[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)*)/g;
                
                Object.entries(window.appDB.cache).forEach(([day, dayData]) => {
                    if (!/^\d{4}-\d{2}-\d{2}$/.test(day) || !dayData.cells) return; 
                    dayData.cells.forEach(cell => {
                        if (cell.type !== 'markdown') return; // Only index text cells
                        let match; regex.lastIndex = 0;
                        while ((match = regex.exec(cell.content)) !== null) {
                            const fullTag = match[1]; 
                            this.tags.add(fullTag); 
                            const rootTag = fullTag.substring(1).split('.')[0].toLowerCase();
                            
                            if (!this.blocksByTagRoot[rootTag]) this.blocksByTagRoot[rootTag] = [];
                            // Store reference to the cell and the day it belongs to
                            this.blocksByTagRoot[rootTag].push({ day, cell, fullTag });
                        }
                    });
                });
                this.isBuilt = true;
            },
            getTags: function() { if (!this.isBuilt) this.build(); return Array.from(this.tags).sort(); },
            getMentionsForRoot: function(root) { if (!this.isBuilt) this.build(); return this.blocksByTagRoot[root.toLowerCase()] || []; },
            invalidate: function() { this.isBuilt = false; }
        };

        // ============================================================================
        // 🐍 PYTHON ENGINE (Pyodide)
        // ============================================================================
        async function initEngine() {
            try {
                pyodide = await loadPyodide({
                    stdout: (msg) => { window.appendOutput(window.CURRENT_CELL_ID, msg + '\n', 'text'); },
                    stderr: (msg) => { window.appendOutput(window.CURRENT_CELL_ID, msg + '\n', 'error'); }
                });
                
                await pyodide.loadPackage(["micropip"]);

                // Inject Custom Database Wrapper Module into Python
                await pyodide.runPythonAsync(`
                    import sys, js
                    from pyodide.ffi import to_js

                    class DatabaseProxy:
                        @staticmethod
                        async def query(sql, params=None):
                            js_params = to_js(params) if params is not None else []
                            res = await js.execute_sql_bridge(sql, js_params)
                            return res.to_py()
                            
                        @staticmethod
                        async def execute(sql, params=None):
                            js_params = to_js(params) if params is not None else []
                            await js.execute_sql_bridge(sql, js_params)

                    sys.modules['db'] = DatabaseProxy()

                    def _attempt_display(obj):
                        if hasattr(obj, '_repr_html_'):
                            js.appendOutput(js.CURRENT_CELL_ID, obj._repr_html_(), 'html')
                        else:
                            js.appendOutput(js.CURRENT_CELL_ID, repr(obj) + '\\n', 'text')
                            
                    sys.modules['display_hook'] = _attempt_display
                `);

                window.isPyodideReady = true;
                ui.pyStatus.textContent = "ENGINE READY [PYTHON + DB]";
                setTimeout(() => ui.pyStatus.style.opacity = '0.5', 2000);

            } catch (err) {
                console.error("Boot Error:", err);
                ui.pyStatus.textContent = "ENGINE OFFLINE";
                ui.pyStatus.style.color = "#ef4444";
            }
        }

        window.execute_sql_bridge = async function(query, params) {
            try { const res = await window.appDB.db.query(query, params); return res.rows; } 
            catch (e) { throw e; }
        };

        // ============================================================================
        // 🗺️ ROUTING & VIRTUAL PAGES
        // ============================================================================
        function getLocalYYYYMMDD(date) { return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`; }

        window.loadVirtualPage = async function(keyStr) {
            // Save current state before leaving
            await window.executeSave();
            
            // Unmount current editors safely
            window.cells.forEach(c => { if(c.cm) c.cm.toTextArea(); });
            ui.container.innerHTML = '';
            window.cells = [];

            // Parse Route
            window.currentDateStr = keyStr;
            let tagParts = [];
            if (keyStr.startsWith('tag-')) { 
                tagParts = keyStr.substring(4).split('.').filter(Boolean); 
                window.currentDateStr = 'tag-' + tagParts[0]; 
            }

            // --- 1. SET HEADERS & UI ---
            if (/^\d{4}-\d{2}-\d{2}$/.test(window.currentDateStr)) {
                const [y, m, d] = window.currentDateStr.split('-'); const date = new Date(y, m - 1, d);
                ui.header.innerHTML = `!${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`;
                window.isReadOnlyView = false;
                ui.controls.style.display = 'flex';
            } else if (window.currentDateStr === 'tag-personas') {
                ui.header.innerHTML = '@PERSONAS';
                window.isReadOnlyView = true;
                ui.controls.style.display = 'none';
            } else if (window.currentDateStr === 'date-index') {
                ui.header.innerHTML = '!TIMELINE';
                window.isReadOnlyView = true;
                ui.controls.style.display = 'none';
            } else if (window.currentDateStr.startsWith('tag-')) {
                ui.header.innerHTML = '@' + tagParts[0].toUpperCase();
                window.isReadOnlyView = true;
                ui.controls.style.display = 'none';
            }

            // --- 2. LOAD DATA OR RENDER DIRECTORY ---
            if (!window.isReadOnlyView) {
                // STANDARD NOTEBOOK
                const cachedData = window.appDB.cache[window.currentDateStr];
                if (cachedData && cachedData.cells && cachedData.cells.length > 0) {
                    cachedData.cells.forEach(c => window.addCell(c.type, c.content, c.output, false));
                } else {
                    window.addCell('markdown', '# ' + window.currentDateStr + '\nStart typing...', '', false);
                }
            } else {
                // VIRTUAL DIRECTORIES
                if (window.currentDateStr === 'tag-personas') {
                    renderTagDirectory();
                } else if (window.currentDateStr === 'date-index') {
                    renderTimelineDirectory();
                } else if (window.currentDateStr.startsWith('tag-')) {
                    renderTagAggregation(tagParts[0]);
                }
            }
            
            window.scrollTo(0, 0);
        };

        // Directory Renderers
        function renderTagDirectory() {
            const tags = AppIndex.getTags().filter(t => t.toLowerCase() !== '@personas'); 
            const rootTagsSet = new Set(); tags.forEach(t => rootTagsSet.add(t.split('.')[0])); 
            const rootTags = Array.from(rootTagsSet).sort();

            const grid = document.createElement('div'); grid.className = 'dir-grid';
            if (rootTags.length === 0) grid.innerHTML = '<div class="dir-card"><div class="dir-card-title">NO TAGS FOUND</div><div class="dir-card-meta">Create one using @tag in a text cell</div></div>';
            
            rootTags.forEach(t => {
                const card = document.createElement('div'); card.className = 'dir-card';
                card.innerHTML = `<div class="dir-card-title">${t}</div><div class="dir-card-meta">${AppIndex.getMentionsForRoot(t.substring(1)).length} MENTIONS</div>`;
                card.onclick = () => window.loadVirtualPage('tag-' + t.replace('@', '').toLowerCase());
                grid.appendChild(card);
            });
            ui.container.appendChild(grid);
        }

        function renderTimelineDirectory() {
            const allDates = Object.keys(window.appDB.cache).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort((a, b) => b.localeCompare(a));
            const grid = document.createElement('div'); grid.className = 'dir-grid';
            
            if (allDates.length === 0) grid.innerHTML = '<div class="dir-card"><div class="dir-card-title">NO NOTES</div></div>';

            allDates.forEach(d => {
                const dateObj = new Date(d + 'T00:00:00');
                const card = document.createElement('div'); card.className = 'dir-card';
                const cellCount = window.appDB.cache[d].cells?.length || 0;
                card.innerHTML = `<div class="dir-card-title">${dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</div><div class="dir-card-meta">${dateObj.toLocaleDateString(undefined, { year: 'numeric', weekday: 'short' }).toUpperCase()} • ${cellCount} CELLS</div>`;
                card.onclick = () => window.loadVirtualPage(d);
                grid.appendChild(card);
            });
            ui.container.appendChild(grid);
        }

        function renderTagAggregation(baseTag) {
            const mentions = AppIndex.getMentionsForRoot(baseTag);
            if (mentions.length === 0) {
                ui.container.innerHTML = '<div style="font-weight: bold; margin-top: 24px;">NO CONTEXT FOUND.</div>';
                return;
            }

            // Group by Day
            const grouped = {};
            mentions.forEach(m => {
                if (!grouped[m.day]) grouped[m.day] = [];
                // Prevent duplicate cell renders if a cell has the tag twice
                if (!grouped[m.day].some(existing => existing.cell.id === m.cell.id)) grouped[m.day].push(m);
            });

            // Render
            Object.keys(grouped).sort().reverse().forEach(day => {
                const dayHeader = document.createElement('div');
                const dObj = new Date(day + 'T00:00:00');
                dayHeader.innerHTML = `<a class="persona-link" style="font-size: 18px; margin: 32px 0 16px 0; display: inline-block;" onclick="window.loadVirtualPage('${day}')">!${dObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })} &rarr;</a>`;
                ui.container.appendChild(dayHeader);

                grouped[day].forEach(m => {
                    // Render the cell identically to the notebook, but entirely read-only
                    window.addCell(m.cell.type, m.cell.content, m.cell.output, false, true);
                });
            });
        }

        // ============================================================================
        // ⌨️ NOTEBOOK EDITOR UI & LOGIC
        // ============================================================================
        
        window.scheduleSave = function() {
            if (window.isReadOnlyView) return;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(window.executeSave, 1000);
        };

        window.executeSave = async function() {
            if (window.isReadOnlyView || !window.currentDateStr || window.cells.length === 0) return Promise.resolve();
            activeSavePromise = activeSavePromise.then(async () => {
                try {
                    const outputData = { cells: [] };
                    window.cells.forEach(c => {
                        // Extract latest content from CodeMirror if exists
                        const currentContent = c.cm ? c.cm.getValue() : c.content;
                        outputData.cells.push({ id: c.id, type: c.type, content: currentContent, output: c.output || '' });
                    });
                    
                    await window.appDB.save(window.currentDateStr, outputData);
                    
                    ui.saveInd.classList.add('visible'); 
                    setTimeout(() => ui.saveInd.classList.remove('visible'), 1500);
                } catch(e) {}
            });
            return activeSavePromise;
        };

        // Header Navigation Logic
        ui.header.onclick = () => {
            if (window.currentDateStr === 'tag-personas') return window.loadVirtualPage(getLocalYYYYMMDD(new Date()));
            if (window.currentDateStr === 'date-index') return window.loadVirtualPage(getLocalYYYYMMDD(new Date()));
            if (window.currentDateStr.startsWith('tag-')) return window.loadVirtualPage('tag-personas');
            if (/^\d{4}-\d{2}-\d{2}$/.test(window.currentDateStr)) return window.loadVirtualPage('date-index');
        };

        // Initialize Core Systems
        window.appDB.init().then(() => { 
            AppIndex.build(); 
            window.loadVirtualPage(getLocalYYYYMMDD(new Date())); 
            initEngine(); 
        });

    </script>

    <!-- Global Functions injected into window for HTML onClick bindings -->
    <script>
        // Linkify Utility for Markdown
        const linkifyRules = [
            {
                pattern: /(^|\s)(@[a-zA-Z0-9_]+(?:\.[a-zA-Z0-9_]+)*)/g,
                render: (match, space, tag) => `${space}<a class="persona-link" onclick="window.loadVirtualPage('tag-${tag.replace('@', '').toLowerCase()}')">${tag}</a>`
            },
            {
                pattern: /(^|\s)(!(?:timeline|\d{4}-\d{2}-\d{2}))/g,
                render: (match, space, tag) => {
                    const target = tag.toLowerCase() === '!timeline' ? 'date-index' : tag.replace('!', '');
                    return `${space}<a class="persona-link" style="background: transparent; color: var(--text-color); border: 2px solid var(--text-color);" onclick="window.loadVirtualPage('${target}')">${tag}</a>`;
                }
            }
        ];

        function applyLinkify(text) {
            let res = text;
            linkifyRules.forEach(r => { res = res.replace(r.pattern, r.render); });
            return res;
        }

        window.addCell = function(type, content = '', output = '', focus = true, forceReadOnly = false) {
            const id = Date.now() + Math.floor(Math.random() * 1000);
            const cell = { id, type, content, output, cm: null };
            
            const isReadonly = window.isReadOnlyView || forceReadOnly;
            
            if (!forceReadOnly) window.cells.push(cell); // Don't add to global state if just rendering for directory
            
            const div = document.createElement('div');
            div.className = `cell-wrapper ${type === 'markdown' ? 'markdown-editor' : ''}`;
            div.id = `cell-wrapper-${id}`;
            
            let actionsHTML = '';
            if (!isReadonly) {
                actionsHTML = `
                    <div class="cell-actions">
                        ${type === 'code' ? `<button class="cell-btn run" onclick="runCell(${id})" title="Run (Shift+Enter)">RUN</button>` : ''}
                        <button class="cell-btn" onclick="moveCell(${id}, -1)">UP</button>
                        <button class="cell-btn" onclick="moveCell(${id}, 1)">DN</button>
                        <button class="cell-btn del" onclick="deleteCell(${id})">DEL</button>
                    </div>
                `;
            }

            if (type === 'code') {
                div.innerHTML = `
                    ${actionsHTML}
                    <textarea id="editor-${id}">${content}</textarea>
                    <div id="output-${id}" class="output-wrapper" style="display: ${output ? 'block' : 'none'};">${output}</div>
                `;
            } else {
                // Markdown Cell
                div.innerHTML = `
                    ${actionsHTML}
                    <div id="md-display-${id}" class="markdown-display" ${!isReadonly ? `ondblclick="editMarkdown(${id})"` : ''}></div>
                    <div id="md-editor-container-${id}" style="display: none;">
                        <textarea id="editor-${id}">${content}</textarea>
                    </div>
                `;
            }

            document.getElementById('notebook-container').appendChild(div);

            if (type === 'code') {
                if (!isReadonly) {
                    initCodeMirror(cell, 'python');
                    if (focus) setTimeout(() => cell.cm.focus(), 50);
                } else {
                    // Static render for code blocks in directories
                    document.getElementById(`editor-${id}`).style.display = 'none';
                    const pre = document.createElement('pre');
                    pre.style.background = 'var(--text-color)'; pre.style.color = 'var(--bg-color)'; pre.style.padding = '12px'; pre.style.fontFamily = 'monospace'; pre.textContent = content;
                    div.insertBefore(pre, document.getElementById(`output-${id}`));
                }
            } else {
                renderMarkdownCell(cell);
                if (focus && !isReadonly) editMarkdown(id);
            }
        };

        function initCodeMirror(cell, mode) {
            const el = document.getElementById(`editor-${cell.id}`);
            const cm = CodeMirror.fromTextArea(el, {
                mode: mode,
                lineNumbers: false,
                matchBrackets: true,
                indentUnit: 4,
                viewportMargin: Infinity,
                extraKeys: {
                    "Shift-Enter": function() {
                        if (cell.type === 'code') window.runCell(cell.id);
                        else renderMarkdownCell(cell); 
                    }
                }
            });
            cm.on("change", () => { cell.content = cm.getValue(); window.scheduleSave(); });
            if (cell.type === 'markdown') {
                cm.on("blur", () => renderMarkdownCell(cell));
            }
            cell.cm = cm;
        }

        function renderMarkdownCell(cell) {
            const displayEl = document.getElementById(`md-display-${cell.id}`);
            const editorEl = document.getElementById(`md-editor-container-${cell.id}`);
            
            const rawContent = cell.cm ? cell.cm.getValue() : cell.content;
            let html = marked.parse(rawContent || (window.isReadOnlyView ? '' : '*Double click to edit text*'));
            html = applyLinkify(html); // Inject Persona/Timeline Links
            
            displayEl.innerHTML = html;
            displayEl.style.display = 'block';
            if (editorEl) editorEl.style.display = 'none';
            
            cell.content = rawContent;
            window.scheduleSave();
        }

        window.editMarkdown = function(id) {
            if (window.isReadOnlyView) return;
            const cell = window.cells.find(c => c.id === id);
            if (!cell) return;
            
            document.getElementById(`md-display-${id}`).style.display = 'none';
            document.getElementById(`md-editor-container-${id}`).style.display = 'block';
            
            if (!cell.cm) initCodeMirror(cell, 'markdown');
            cell.cm.refresh();
            cell.cm.focus();
        };

        window.deleteCell = function(id) {
            const idx = window.cells.findIndex(c => c.id === id);
            if (idx === -1) return;
            window.cells.splice(idx, 1);
            document.getElementById(`cell-wrapper-${id}`).remove();
            window.scheduleSave();
        };

        window.moveCell = function(id, direction) {
            const index = window.cells.findIndex(c => c.id === id);
            if (index < 0) return;
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= window.cells.length) return;
            
            // Swap in array
            const temp = window.cells[index];
            window.cells[index] = window.cells[newIndex];
            window.cells[newIndex] = temp;
            
            // Re-render
            const container = document.getElementById('notebook-container');
            window.cells.forEach(c => { if(c.cm) c.cm.toTextArea(); }); // cleanup CM instances
            container.innerHTML = '';
            
            const oldCells = [...window.cells];
            window.cells = [];
            oldCells.forEach(c => window.addCell(c.type, c.content, c.output, false));
            window.scheduleSave();
        };

        window.appendOutput = function(cellId, content, type) {
            const outContainer = document.getElementById(`output-${cellId}`);
            if (!outContainer) return;
            
            outContainer.style.display = 'block';
            outContainer.className = 'output-wrapper';

            const cell = window.cells.find(c => c.id === cellId);

            if (type === 'html') {
                outContainer.innerHTML += content;
            } else if (type === 'text') {
                const last = outContainer.lastElementChild;
                if (last && last.tagName === 'PRE' && !outContainer.classList.contains('error')) {
                    last.innerText += content;
                } else {
                    const pre = document.createElement('pre');
                    pre.style.margin = '0';
                    pre.innerText = content;
                    outContainer.appendChild(pre);
                }
            } else if (type === 'error') {
                outContainer.classList.add('error');
                const pre = document.createElement('pre');
                pre.style.margin = '0'; pre.style.whiteSpace = 'pre-wrap';
                pre.innerText = content;
                outContainer.appendChild(pre);
            }

            if (cell) cell.output = outContainer.innerHTML;
        };

        window.runCell = async function(id) {
            if (!window.isPyodideReady) return alert("System is booting, please wait...");
            
            const cell = window.cells.find(c => c.id === id);
            if (!cell || cell.type !== 'code') return;
            
            const code = cell.cm.getValue();
            if (!code.trim()) return;

            const outContainer = document.getElementById(`output-${id}`);
            outContainer.innerHTML = '';
            outContainer.style.display = 'block';
            outContainer.className = 'output-wrapper';
            outContainer.innerText = 'EXECUTING...';
            
            window.CURRENT_CELL_ID = id;

            try {
                outContainer.innerText = ''; // Clear executing status
                await window.pyodide.loadPackagesFromImports(code);
                const result = await window.pyodide.runPythonAsync(code);

                if (result !== undefined) {
                    window._last_res = result;
                    await window.pyodide.runPythonAsync(`
                        import js, sys
                        res = js._last_res
                        if res is not None:
                            sys.modules['display_hook'](res)
                    `);
                    if (window.pyodide.isPyProxy(result)) { result.destroy(); }
                    window._last_res = null;
                }

                cell.output = outContainer.innerHTML;

            } catch (err) {
                outContainer.innerHTML = '';
                window.appendOutput(id, err.toString(), 'error');
            } finally {
                window.scheduleSave();
                
                // Auto-advance
                const index = window.cells.findIndex(c => c.id === id);
                if (index === window.cells.length - 1) {
                    window.addCell('code'); 
                } else {
                    const nextCell = window.cells[index + 1];
                    if(nextCell.cm) nextCell.cm.focus();
                }
            }
        };
    </script>
</body>
</html>
